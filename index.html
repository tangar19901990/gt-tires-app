<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top_Secret — GT Tires Service</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Fira+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff69b4;--bg:#0a0a0a;--card:#1e1e1e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Fira Sans',sans-serif;background:var(--bg);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes carbonShift{0%{background-position:0 0}100%{background-position:8px 8px}}
@keyframes neonPulse{0%,100%{text-shadow:0 0 10px var(--pink),0 0 30px var(--pink),0 0 60px rgba(255,20,147,.5)}50%{text-shadow:0 0 20px var(--pink),0 0 50px var(--pink),0 0 90px rgba(255,20,147,.8)}}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(45deg,rgba(255,255,255,.02)25%,transparent 25%,transparent 50%,rgba(255,255,255,.02)50%,rgba(255,255,255,.02)75%,transparent 75%,transparent);background-size:8px 8px;animation:carbonShift 20s linear infinite;pointer-events:none}
.container{position:relative;z-index:1;text-align:center;max-width:500px}
h1{font-family:'Oswald';font-size:3rem;font-weight:700;color:var(--pink);animation:neonPulse 2.5s ease-in-out infinite;margin-bottom:8px}
.sub{font-family:'Oswald';font-size:.9rem;color:var(--pink);letter-spacing:4px;opacity:.7;margin-bottom:40px}
.links{display:flex;flex-direction:column;gap:14px}
.link-btn{display:block;padding:18px 24px;background:var(--card);border:2px solid var(--pink);border-radius:14px;color:#fff;text-decoration:none;font-weight:600;font-size:1rem;transition:.2s}
.link-btn:hover{background:var(--pink);color:#000;transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,20,147,.4)}
.link-btn .icon{font-size:1.4rem;margin-right:10px}
.link-btn .desc{display:block;font-size:.75rem;opacity:.7;font-weight:400;margin-top:4px}
</style>
</head>
<body>
<div class="container">
  <h1>Top_Secret</h1>
  <div class="sub">GT Tires Service • Велика Димерка</div>
  <div class="links">
    <a href="gt-tires-v4.html" class="link-btn">
      <span class="icon">🔧</span>Адмін-панель
      <span class="desc">Замовлення, клієнти, прайс, каса, звіти</span>
    </a>
    <a href="gt-tires-miniapp.html" class="link-btn">
      <span class="icon">📱</span>Telegram Mini App
      <span class="desc">Для клієнтів — калькулятор послуг</span>
    </a>
  </div>
</div>
</body>
</html>
