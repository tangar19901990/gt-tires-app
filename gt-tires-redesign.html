<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GT Tires — редизайн</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060608; --card:linear-gradient(170deg,#101116,#0a0a0d); --card-bd:#20222b;
  --panel:linear-gradient(165deg,#171922,#0d0e13); --panel-bd:#23252d;
  --red:#e01f26; --red-grad:linear-gradient(165deg,#ff4136,#c4181e 48%,#7c0f13);
  --green:#4fce5a; --green-grad:linear-gradient(165deg,#3ecb5f,#127a2f);
  --blue:#4a9bff; --warn:#f0c24a; --debt:#ff5a52;
  --txt:#f2f3f5; --txt2:#c9ccd2; --dim:#8b8f98;
  --neon-card:0 16px 34px -18px rgba(0,0,0,.9),0 0 26px -12px rgba(64,140,255,.3),inset 0 1px 0 rgba(255,255,255,.04);
  --neon-red:0 12px 26px -8px rgba(224,31,38,.7),0 0 34px -2px rgba(224,31,38,.65),0 0 60px -10px rgba(224,31,38,.4),inset 0 1px 0 rgba(255,255,255,.4),inset 0 -3px 8px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);font-family:'Fira Sans',system-ui,sans-serif;color:var(--txt)}
::-webkit-scrollbar{width:10px}::-webkit-scrollbar-thumb{background:#26282f;border-radius:6px}::-webkit-scrollbar-track{background:transparent}
@keyframes gtGlow{0%,100%{box-shadow:0 10px 26px -8px rgba(224,31,38,.5)}50%{box-shadow:0 12px 38px -4px rgba(224,31,38,.9)}}
@keyframes gtPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.oswald{font-family:'Oswald',sans-serif}

.gt-app{display:grid;grid-template-columns:236px 1fr;height:100vh;background:radial-gradient(1100px 560px at 75% -12%,#181a22,#060608 62%);overflow:hidden}
@media(max-width:820px){.gt-app{grid-template-columns:1fr}.sidebar{position:fixed;z-index:40;width:236px;height:100%;left:-260px;transition:left .22s ease}.sidebar.open{left:0}.burger{display:grid !important}}

/* sidebar */
.sidebar{display:flex;flex-direction:column;gap:8px;padding:16px 14px;overflow-y:auto;border-right:1px solid #141519;background:linear-gradient(180deg,#0c0d12,#060608);box-shadow:inset -14px 0 26px -20px #000}
.logo{padding:4px 6px 10px}
.logo .l1{font-family:'Oswald';font-weight:700;font-size:26px;letter-spacing:1px;text-shadow:0 2px 10px rgba(0,0,0,.8)}
.logo .l1 b{color:var(--red);text-shadow:0 0 18px rgba(224,31,38,.75)}
.logo .l2{font-size:11px;letter-spacing:1px;color:var(--dim);margin-top:2px}
.nav{display:flex;align-items:center;gap:13px;padding:12px 15px;border-radius:13px;cursor:pointer;margin-bottom:8px;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
.nav svg{width:22px;height:22px;flex:none}
.nav .lbl{font-size:14.5px;flex:1}
.nav .badge{font-size:11px;font-weight:700;border-radius:20px;padding:1px 7px}
.nav.off{background:var(--panel);border:1px solid var(--panel-bd);color:var(--txt2);box-shadow:0 6px 14px -6px rgba(0,0,0,.7),0 0 18px -6px rgba(64,140,255,.35),inset 0 1px 0 rgba(255,255,255,.06)}
.nav.off:hover{background:linear-gradient(165deg,#1c1f2a,#111319);border-color:#3a3d47;transform:translateX(4px);box-shadow:0 10px 22px -8px rgba(0,0,0,.85),0 0 26px -2px rgba(64,140,255,.6),inset 0 1px 0 rgba(255,255,255,.09)}
.nav.off .badge{background:var(--red);color:#fff}
.nav.on{background:var(--red-grad);color:#fff;font-weight:700;box-shadow:var(--neon-red);text-shadow:0 1px 2px rgba(0,0,0,.55);transform:translateX(2px)}
.nav.on .badge{background:#fff;color:var(--red)}
.side-plate{display:flex;align-items:center;gap:13px;padding:12px 15px;border-radius:13px;background:linear-gradient(165deg,#14151b,#0a0a0d);border:1px solid #2a2c34;margin-top:auto;box-shadow:0 0 22px -6px rgba(64,140,255,.45),inset 0 1px 0 rgba(255,255,255,.06)}

/* main */
.main{min-width:0;display:flex;flex-direction:column;overflow:hidden}
.ts-strip{background:linear-gradient(90deg,#1a0b0c,#2b1606 50%,#1a0b0c);border-bottom:1px solid #3d2f16;padding:7px 20px;text-align:center;font-family:'Oswald';font-weight:600;font-size:13px;letter-spacing:2px;color:var(--warn)}
.hdr{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid #141519}
.hdr .pfp{width:44px;height:44px;border-radius:50%;background:var(--red-grad);display:grid;place-items:center;font-family:'Oswald';font-weight:700;box-shadow:0 0 18px -4px rgba(224,31,38,.6)}
.hdr .who{flex:1}
.hdr .who b{font-family:'Oswald';font-size:16px;letter-spacing:.4px}
.hdr .who span{display:block;font-size:12px;color:var(--dim)}
.hdr .caret{width:38px;height:38px;border-radius:11px;background:var(--panel);border:1px solid var(--panel-bd);color:var(--txt2);display:grid;place-items:center;cursor:pointer}
.burger{display:none;width:38px;height:38px;border-radius:11px;background:var(--panel);border:1px solid var(--panel-bd);place-items:center;cursor:pointer;color:var(--txt)}

.content{flex:1;overflow-y:auto;padding:22px}
.bottom{display:flex;align-items:center;gap:18px;padding:10px 20px;border-top:1px solid #141519;font-size:12.5px;color:var(--txt2);background:linear-gradient(0deg,#0a0b0f,transparent)}
.bottom .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.bottom .exit{margin-left:auto;padding:7px 14px;border-radius:10px;border:1px solid #4d1e20;color:var(--debt);cursor:pointer;background:#160c0d}

/* generic ui */
.h1{font-family:'Oswald';font-weight:700;font-size:24px;letter-spacing:.4px}
.btn{border:none;cursor:pointer;font-family:'Oswald';font-weight:600;font-size:14px;letter-spacing:.4px;border-radius:11px;padding:11px 16px;color:#fff}
.btn.green{background:var(--green-grad);box-shadow:0 8px 18px -8px rgba(53,161,58,.7)}
.btn.red{background:var(--red-grad);box-shadow:0 8px 18px -8px rgba(224,31,38,.7)}
.btn.ghost{background:var(--panel);border:1px solid var(--panel-bd);color:var(--txt2)}
.chip{padding:8px 15px;border-radius:9px;font-size:13px;cursor:pointer;border:1px solid var(--panel-bd);background:var(--panel);color:var(--txt2)}
.chip.on{background:var(--red-grad);color:#fff;border-color:transparent;box-shadow:0 6px 16px -8px rgba(224,31,38,.7)}
.search{display:flex;align-items:center;gap:10px;background:#111216;border:1px solid #1e2028;border-radius:12px;padding:11px 15px;color:var(--dim)}
.search input{background:transparent;border:none;outline:none;color:var(--txt);font-size:14px;flex:1}
.kpi{display:flex;gap:14px;flex-wrap:wrap;margin:4px 0 18px}
.kpi .k{flex:1;min-width:150px;background:var(--card);border:1px solid var(--card-bd);border-radius:16px;padding:14px 16px;box-shadow:var(--neon-card)}
.kpi .k .kl{font-size:12px;color:var(--dim)}
.kpi .k .kv{font-family:'Oswald';font-weight:700;font-size:24px;margin-top:3px}

/* order cards */
.ord{background:var(--card);border:1px solid var(--card-bd);border-left-width:4px;border-radius:16px;padding:14px 16px;margin-bottom:12px;box-shadow:var(--neon-card);display:grid;grid-template-columns:1fr auto auto;gap:14px;align-items:center}
.ord .rid{font:600 11px/1 ui-monospace,monospace;padding:4px 8px;border-radius:6px;background:rgba(255,255,255,.08);color:#e8e9ec;display:inline-block;margin-bottom:6px}
.ord .cli{font-family:'Oswald';font-size:17px}
.ord .meta{font-size:12.5px;color:var(--dim);margin-top:3px}
.ord .svc{font-size:13px;color:var(--txt2);margin-top:6px}
.ord .sum{font-family:'Oswald';font-weight:700;font-size:22px;text-align:right}
.ord .st{font-size:12px;font-weight:700;padding:6px 12px;border-radius:20px;cursor:pointer;white-space:nowrap}
.ord .acts{display:flex;flex-direction:column;gap:6px}
.ord .acts button{width:34px;height:34px;border-radius:9px;background:var(--panel);border:1px solid var(--panel-bd);color:var(--txt2);cursor:pointer;font-size:14px}
.placeholder{display:grid;place-items:center;height:70%;color:var(--dim);text-align:center}
.placeholder .pi{font-size:40px;margin-bottom:10px;opacity:.6}
.toprow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
</style>
</head>
<body>
<div class="gt-app">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="logo"><div class="l1"><b>GT</b> TIRES</div><div class="l2">ШИНОМОНТАЖНИЙ ЦЕНТР</div></div>
    <div id="navwrap"></div>
    <div class="side-plate"><span style="font-size:17px;color:var(--red)">▦</span><div><div class="oswald" style="font-weight:700;font-size:13px;letter-spacing:.5px">GT TIRES</div><div style="font-size:10px;color:var(--dim)">Велика Димерка</div></div></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="ts-strip">⚡ TOP SECRET MODE — МАЙСТЕР 35% ⚡</div>
    <div class="hdr" id="hdr">
      <div class="burger" id="burger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</div>
      <div class="pfp">TS</div>
      <div class="who"><b>Top_Secret Ne_tot_brat</b><span>майстер · зміна 08:00–20:00</span></div>
      <div class="caret" id="caret" onclick="toggleHeader()">▲</div>
    </div>
    <div class="content" id="content"></div>
    <div class="bottom">
      <span id="clock" class="oswald" style="font-size:15px"></span>
      <span id="date"></span>
      <span><span class="dot" style="background:var(--red)"></span>Майстер</span>
      <span><span class="dot" style="background:var(--green)"></span>Зміна активна</span>
      <div class="exit">↪ Вийти</div>
    </div>
  </div>
</div>

<script>
// ---- inline SVG іконки меню (замість PNG-асетів) ----
const I = {
  home:'<path d="M4 12l8-7 8 7"/><path d="M6 10v9h12v-9"/>',
  orders:'<rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 3h6v3H9z"/><path d="M8 11h8M8 15h6"/>',
  clients:'<circle cx="9" cy="8" r="3"/><path d="M4 20c0-3 2.5-5 5-5s5 2 5 5"/><path d="M16 7a3 3 0 010 6"/>',
  price:'<path d="M4 12V5h7l9 9-7 7-9-9z"/><circle cx="8.5" cy="8.5" r="1.3"/>',
  tires:'<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/>',
  sklad:'<path d="M4 9l8-5 8 5v10H4z"/><path d="M4 9h16M9 19v-6h6v6"/>',
  kasa:'<rect x="3" y="7" width="18" height="12" rx="2"/><circle cx="12" cy="13" r="2.5"/>',
  debtors:'<path d="M12 3l9 16H3z"/><path d="M12 10v4M12 17v.5"/>',
  salary:'<rect x="4" y="6" width="16" height="12" rx="2"/><circle cx="12" cy="12" r="2.6"/><path d="M7 6v-1M17 6v-1"/>',
  reports:'<path d="M5 20V10M12 20V4M19 20v-7"/>',
  settings:'<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/>',
};
const EMOJI={tiresai:'🤖',aitools:'🧠',tireprices:'🛞'};
const NAV=[
 {id:'home',label:'Послуги'},{id:'orders',label:'Замовлення'},{id:'clients',label:'Клієнти'},
 {id:'price',label:'Прайс'},{id:'tires',label:'Шини'},{id:'sklad',label:'Склад'},
 {id:'kasa',label:'Каса'},{id:'debtors',label:'Боржники',badge:1},{id:'salary',label:'Зарплата'},
 {id:'reports',label:'Звіти'},{id:'settings',label:'Налаштування'},
 {id:'tiresai',label:'Шини AI'},{id:'aitools',label:'AI Tools'},{id:'tireprices',label:'Ціни шин'}
];

let state={tab:'orders', orderFilter:'Усі', headerShown:true};

// демо-замовлення (тут пізніше під'єднаємо реальні дані з app.js/Supabase)
const STATUS={'Нове':'#4a9bff','В роботі':'#f0c24a','Готово':'#4fce5a','Оплачено':'#4fce5a','Борг':'#ff5a52'};
const CYCLE=['Нове','В роботі','Готово'];
let orders=[
 {r:'R42',name:'Олег',car:'VW Passat · AI1234BC',date:'06.07.2026',pay:'💵',svc:'Шиномонтаж R16 ×4',sum:1200,status:'Нове'},
 {r:'R41',name:'Ірина',car:'Renault Trafic · AA55AA',date:'06.07.2026',pay:'💳',svc:'Балансування ×4, латка',sum:850,status:'В роботі'},
 {r:'R40',name:'СТО Захід',car:'МАЗ · BC77KH',date:'05.07.2026',pay:'💵',svc:'Шиномонтаж с/г 33"+',sum:3200,status:'Готово'},
 {r:'R39',name:'Петро',car:'Ford Focus',date:'05.07.2026',pay:'💵',svc:'Ремонт камери',sum:400,status:'Борг'},
];

function renderNav(){
  document.getElementById('navwrap').innerHTML = NAV.map(n=>{
    const on=n.id===state.tab;
    const ic = EMOJI[n.id] ? `<span style="font-size:17px;width:22px;text-align:center">${EMOJI[n.id]}</span>`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">${I[n.id]||''}</svg>`;
    const badge = n.badge?`<span class="badge">${n.badge}</span>`:'';
    return `<div class="nav ${on?'on':'off'}" onclick="go('${n.id}')">${ic}<span class="lbl">${n.label}</span>${badge}</div>`;
  }).join('');
}
function go(id){ state.tab=id; if(window.innerWidth<=820) document.getElementById('sidebar').classList.remove('open'); render(); }
function toggleHeader(){ state.headerShown=!state.headerShown; document.getElementById('hdr').style.display=state.headerShown?'flex':'none'; document.querySelector('.ts-strip').style.display=state.headerShown?'block':'none'; document.getElementById('caret').textContent=state.headerShown?'▲':'▼'; }

function fmt(n){return new Intl.NumberFormat('uk-UA').format(n)+' ₴';}

function ordersView(){
  const revenue=orders.filter(o=>o.status!=='Борг').reduce((a,o)=>a+o.sum,0);
  const debt=orders.filter(o=>o.status==='Борг').reduce((a,o)=>a+o.sum,0);
  const flt=['Усі','Нове','В роботі','Готово','Оплачено','Борг'];
  const list=orders.filter(o=>state.orderFilter==='Усі'||o.status===state.orderFilter);
  return `
   <div class="toprow">
     <div class="h1" style="flex:1">Замовлення</div>
     <button class="btn green">＋ НОВЕ</button>
     <button class="btn ghost">🖨️</button>
   </div>
   <div class="kpi">
     <div class="k"><div class="kl">Виручка (демо)</div><div class="kv" style="color:var(--green)">${fmt(revenue)}</div></div>
     <div class="k"><div class="kl">Борги</div><div class="kv" style="color:var(--debt)">${fmt(debt)}</div></div>
     <div class="k"><div class="kl">Замовлень</div><div class="kv">${orders.length}</div></div>
   </div>
   <div class="search" style="margin-bottom:14px"><span>🔍</span><input placeholder="Пошук: клієнт / авто / номер…"></div>
   <div class="toprow">${flt.map(f=>`<div class="chip ${f===state.orderFilter?'on':''}" onclick="setFilter('${f}')">${f}</div>`).join('')}</div>
   ${list.map(o=>`
     <div class="ord" style="border-left-color:${STATUS[o.status]}">
       <div>
         <span class="rid">${o.r}</span>
         <div class="cli">${o.name}</div>
         <div class="meta">${o.car} · 📅 ${o.date} · ${o.pay}</div>
         <div class="svc">${o.svc}</div>
       </div>
       <div>
         <div class="sum">${fmt(o.sum)}</div>
         <div class="st" style="background:${STATUS[o.status]}22;color:${STATUS[o.status]};margin-top:8px;text-align:center" onclick="cycleStatus('${o.r}')">${o.status}</div>
       </div>
       <div class="acts"><button>✏️</button><button>🖨️</button><button>🗑️</button></div>
     </div>`).join('')}
  `;
}
function setFilter(f){state.orderFilter=f;render();}
function cycleStatus(r){const o=orders.find(x=>x.r===r);if(!o)return;const i=CYCLE.indexOf(o.status);if(i>=0)o.status=CYCLE[(i+1)%CYCLE.length];render();}

function placeholder(label){return `<div class="placeholder"><div><div class="pi">🚧</div><div class="oswald" style="font-size:20px;color:var(--txt2)">${label}</div><div style="margin-top:6px">Екран у плані Етапу 2</div></div></div>`;}

function render(){
  renderNav();
  const c=document.getElementById('content');
  if(state.tab==='orders') c.innerHTML=ordersView();
  else { const n=NAV.find(x=>x.id===state.tab); c.innerHTML=placeholder(n?n.label:''); }
}

function tick(){const d=new Date();document.getElementById('clock').textContent=d.toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});document.getElementById('date').textContent=d.toLocaleDateString('uk-UA',{day:'2-digit',month:'long',year:'numeric'});}
tick();setInterval(tick,1000);
render();
</script>
</body>
</html>
