<style>
  :root{--bg:#070a12;--card:#11151f;--line:#222838;--text:#f2f4f8;--muted:#8891a5;
    --red:#ff2d2d;--blue:#2f7bff;--green:#22c55e;--purple:#a855f7;--orange:#ff8a1f;--teal:#13b6a3;--gold:#ffce1f;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Montserrat',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:14px 14px 36px;
    background-image:radial-gradient(90% 50% at 20% 0%,rgba(47,123,255,.12),transparent 60%),radial-gradient(80% 45% at 90% 5%,rgba(255,45,45,.12),transparent 55%);}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .icon-btn{width:38px;height:38px;border-radius:11px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;}
  .icon-btn svg{width:20px;height:20px;stroke:var(--muted);fill:none;stroke-width:2;}
  .logo{font-family:'Oswald',sans-serif;font-style:italic;font-weight:700;text-align:center;font-size:46px;line-height:.9;letter-spacing:1px;margin:6px 0 2px;}
  .logo .gt{color:var(--red);text-shadow:0 0 18px rgba(255,45,45,.65);} .logo .tr{color:#fff;text-shadow:0 0 14px rgba(255,255,255,.25);}
  .tagline{text-align:center;color:var(--muted);font-size:10.5px;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;}
  .hello{font-size:17px;font-weight:700;margin:0 4px 12px;} .hello b{color:var(--red);}
  .busy{width:100%;border:none;cursor:pointer;border-radius:18px;padding:16px 18px;display:flex;align-items:center;gap:13px;margin-bottom:16px;
    transition:transform .12s ease,box-shadow .25s ease,background .25s ease;color:#fff;font-family:inherit;}
  .busy:active{transform:scale(.98);}
  .busy .b-dot{width:15px;height:15px;border-radius:50%;background:#fff;flex-shrink:0;box-shadow:0 0 0 5px rgba(255,255,255,.18);}
  .busy .b-title{font-weight:900;font-size:18px;letter-spacing:.5px;} .busy .b-sub{font-size:11.5px;opacity:.9;margin-top:1px;}
  .busy .b-hint{margin-left:auto;font-size:10px;opacity:.75;text-align:right;line-height:1.3;}
  .busy.free{background:linear-gradient(135deg,#16331f,#0f2417);box-shadow:0 0 22px rgba(34,197,94,.28),inset 0 0 0 1px rgba(34,197,94,.5);}
  .busy.free .b-dot{background:var(--green);box-shadow:0 0 12px var(--green),0 0 0 5px rgba(34,197,94,.22);} .busy.free .b-title{color:#4ade80;}
  .busy.busy-on{background:linear-gradient(135deg,#3a1414,#260d0d);box-shadow:0 0 22px rgba(255,45,45,.30),inset 0 0 0 1px rgba(255,45,45,.55);}
  .busy.busy-on .b-dot{background:var(--red);box-shadow:0 0 12px var(--red),0 0 0 5px rgba(255,45,45,.22);} .busy.busy-on .b-title{color:#ff6b6b;}
  .cta{width:100%;border:none;cursor:pointer;border-radius:18px;padding:18px;display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px;
    background:linear-gradient(135deg,#ff3b3b,#cc1414);color:#fff;font-family:inherit;box-shadow:0 0 26px rgba(255,45,45,.45);transition:transform .12s ease;}
  .cta:active{transform:scale(.98);} .cta svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2;} .cta span{font-weight:900;font-size:18px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .tile{border:none;cursor:pointer;border-radius:16px;padding:16px 14px;text-align:left;background:var(--card);font-family:inherit;color:var(--text);
    display:flex;align-items:center;gap:12px;transition:transform .12s ease;position:relative;overflow:hidden;}
  .tile:active{transform:scale(.97);}
  .tile .ic{width:42px;height:42px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .tile .ic svg{width:23px;height:23px;fill:none;stroke-width:2;}
  .tile .t1{font-weight:800;font-size:14px;line-height:1.15;} .tile .t2{color:var(--muted);font-size:11px;margin-top:2px;}
  .tile.wide{grid-column:1 / -1;}
  .c-blue{box-shadow:inset 0 0 0 1px rgba(47,123,255,.45),0 0 16px rgba(47,123,255,.12);} .c-blue .ic{background:rgba(47,123,255,.16);} .c-blue .ic svg{stroke:var(--blue);}
  .c-green{box-shadow:inset 0 0 0 1px rgba(34,197,94,.45),0 0 16px rgba(34,197,94,.12);} .c-green .ic{background:rgba(34,197,94,.16);} .c-green .ic svg{stroke:var(--green);}
  .c-purple{box-shadow:inset 0 0 0 1px rgba(168,85,247,.45),0 0 16px rgba(168,85,247,.12);} .c-purple .ic{background:rgba(168,85,247,.16);} .c-purple .ic svg{stroke:var(--purple);}
  .c-orange{box-shadow:inset 0 0 0 1px rgba(255,138,31,.45),0 0 16px rgba(255,138,31,.12);} .c-orange .ic{background:rgba(255,138,31,.16);} .c-orange .ic svg{stroke:var(--orange);}
  .c-teal{box-shadow:inset 0 0 0 1px rgba(19,182,163,.45),0 0 16px rgba(19,182,163,.12);} .c-teal .ic{background:rgba(19,182,163,.16);} .c-teal .ic svg{stroke:var(--teal);}
  .c-red{box-shadow:inset 0 0 0 1px rgba(255,45,45,.45),0 0 16px rgba(255,45,45,.12);} .c-red .ic{background:rgba(255,45,45,.16);} .c-red .ic svg{stroke:var(--red);}
  .footer{text-align:center;color:var(--muted);font-size:10.5px;margin-top:22px;}
  .overlay{position:fixed;inset:0;background:var(--bg);z-index:50;overflow-y:auto;padding:16px 14px 40px;transform:translateX(100%);transition:transform .28s ease;
    background-image:radial-gradient(90% 40% at 50% 0%,rgba(255,206,31,.10),transparent 60%);}
  .overlay.open{transform:translateX(0);}
  .ov-head{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
  .ov-back{width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
  .ov-back svg{width:22px;height:22px;stroke:var(--gold);fill:none;stroke-width:2.2;}
  .ov-title{font-family:'Oswald',sans-serif;font-style:italic;font-weight:700;font-size:24px;color:var(--gold);text-shadow:0 0 14px rgba(255,206,31,.4);}
  .admin-btn{margin-left:auto;background:var(--card);border:1px solid var(--line);color:var(--gold);font-family:inherit;font-weight:700;font-size:12px;
    padding:8px 12px;border-radius:10px;cursor:pointer;}
  .ov-note{color:var(--muted);font-size:11px;margin:0 2px 14px 54px;}
  .cat{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:11px;overflow:hidden;}
  .cat-head{display:flex;align-items:center;gap:12px;padding:15px 14px;cursor:pointer;}
  .cat-ic{width:44px;height:44px;border-radius:12px;background:rgba(255,206,31,.14);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .cat-ic svg{width:25px;height:25px;stroke:var(--gold);fill:none;stroke-width:1.9;}
  .cat-name{font-weight:800;font-size:15px;} .cat-from{color:var(--gold);font-size:12.5px;font-weight:700;margin-top:2px;}
  .cat-chev{margin-left:auto;color:var(--muted);transition:transform .2s ease;} .cat.open .cat-chev{transform:rotate(180deg);}
  .cat-body{display:none;padding:0 14px 12px;} .cat.open .cat-body{display:block;}
  .grp-title{color:var(--gold);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px;opacity:.85;}
  .row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:1px solid rgba(255,255,255,.05);font-size:13.5px;}
  .row.editable{cursor:pointer;} .row.editable:active{opacity:.6;}
  .row .v{font-weight:800;color:#fff;white-space:nowrap;} .row .v small{color:var(--muted);font-weight:500;font-size:11px;}
  .row .pen{font-size:12px;margin-left:4px;}
  .add-row{width:100%;margin-top:12px;background:rgba(34,197,94,.12);border:1px dashed rgba(34,197,94,.5);color:#4ade80;font-family:inherit;
    font-weight:700;font-size:13px;padding:11px;border-radius:11px;cursor:pointer;}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:60;display:none;align-items:flex-end;}
  .modal.open{display:flex;}
  .modal-card{background:#10141d;border-top:1px solid var(--line);border-radius:20px 20px 0 0;width:100%;padding:20px 18px 26px;}
  .modal-title{font-weight:900;font-size:18px;margin-bottom:14px;color:var(--gold);}
  .modal label{display:block;font-size:11px;color:var(--muted);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.5px;}
  .modal input,.modal select{width:100%;background:#070a12;border:1px solid var(--line);color:#fff;font-family:inherit;font-size:15px;padding:12px;border-radius:11px;}
  .modal-btns{display:flex;gap:10px;margin-top:18px;}
  .modal-btns button{flex:1;border:none;font-family:inherit;font-weight:800;font-size:14px;padding:13px;border-radius:11px;cursor:pointer;}
  .md-del{background:rgba(255,45,45,.16);color:#ff6b6b;flex:0 0 auto !important;padding:13px 16px !important;}
  .md-cancel{background:#222838;color:#cfd5e3;} .md-save{background:linear-gradient(135deg,#ffce1f,#f0a500);color:#0a0a0a;}
</style>
</head>
<body>

  <script>
    const SUPABASE_URL = "https://lxeswqlkereptdtwytbp.supabase.co";

    const ADMIN_ID = 5881869526;   // твій Telegram id

  <div class="topbar">

<script>
  const tg = window.Telegram?.WebApp;
  if (tg){ tg.expand(); tg.setHeaderColor?.('#070a12'); tg.setBackgroundColor?.('#070a12');
    const name = tg.initDataUnsafe?.user?.first_name; if (name) document.getElementById('userName').textContent = name; }
  const H = { apikey:SUPABASE_KEY, Authorization:'Bearer '+SUPABASE_KEY };
  function note(m){ if(tg?.showAlert) tg.showAlert(m); else alert(m); }
  function ask(m,cb){ if(tg?.showConfirm) tg.showConfirm(m,cb); else cb(confirm(m)); }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ---- Завантаженість ----
  let isFree=true;
  function paintBusy(){const b=document.getElementById('busyBtn'),t=document.getElementById('busyTitle'),s=document.getElementById('busySub');
    if(isFree){b.classList.add('free');b.classList.remove('busy-on');t.textContent='ВІЛЬНО';s.textContent='Можна під\'їжджати';}
    else{b.classList.add('busy-on');b.classList.remove('free');t.textContent='ЗАЙНЯТО';s.textContent='Майстер у роботі';}}
  async function loadBusy(){try{const r=await fetch(SUPABASE_URL+'/rest/v1/gt_queue?id=eq.1&select=is_open',{headers:H});const rows=await r.json();if(rows&&rows[0]){isFree=!!rows[0].is_open;paintBusy();}}catch(e){}}
  loadBusy();
  async function toggleBusy(){isFree=!isFree;paintBusy();try{await fetch(SUPABASE_URL+'/rest/v1/gt_queue?id=eq.1',{method:'PATCH',headers:{...H,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify({is_open:isFree,status_text:isFree?'Відчинено':'Зайнято'})});}catch(e){}}

  // ---- Ціни ----
  const CATS = [
    {name:'Легкові', sub:'седан · хетчбек · універсал', icon:'<path d="M3 13l2-5a3 3 0 012.8-2h8.4A3 3 0 0119 8l2 5v4h-2a2 2 0 01-4 0H9a2 2 0 01-4 0H3v-4z"/><circle cx="7.5" cy="17" r="1.4"/><circle cx="16.5" cy="17" r="1.4"/>'},
    {name:'Позашляховики', sub:'джип · кросовер · SUV · мінівен', icon:'<path d="M3 14l1.5-6A3 3 0 017.4 6h9.2A3 3 0 0119.5 8L21 14v4h-2a2 2 0 01-4 0H9a2 2 0 01-4 0H3v-4z"/><circle cx="7.5" cy="18" r="1.4"/><circle cx="16.5" cy="18" r="1.4"/>'},
    {name:'Бус / комерційний', sub:'до R18', icon:'<rect x="3" y="6" width="15" height="9" rx="1.5"/><path d="M18 9h2.2L22 13v2h-4"/><circle cx="7" cy="17" r="1.4"/><circle cx="17" cy="17" r="1.4"/>'},
    {name:'Вантажні', sub:'R16 – R24.5', icon:'<rect x="2" y="7" width="11" height="8" rx="1"/><path d="M13 10h4l3 3v2h-7"/><circle cx="6" cy="17" r="1.5"/><circle cx="17" cy="17" r="1.5"/>'},
    {name:'С/Г та спецтехніка', sub:'трактори · спецтехніка', icon:'<circle cx="8" cy="15" r="4"/><circle cx="18" cy="16" r="3"/><path d="M4 12V8h5l2 3" stroke-linejoin="round"/>'}
  ];
  let isAdmin=false, editMode=false, priceRows=[], editId=null;
  if (tg?.initDataUnsafe?.user?.id === ADMIN_ID) isAdmin=true;

  async function fetchPrices(){try{const r=await fetch(SUPABASE_URL+'/rest/v1/app_prices?select=*&order=sort.asc',{headers:H});priceRows=await r.json();if(!Array.isArray(priceRows))priceRows=[];}catch(e){priceRows=[];}}
  function fromPrice(cn){const ns=priceRows.filter(r=>r.category===cn).map(r=>parseInt(String(r.price))).filter(n=>!isNaN(n));return ns.length?Math.min(...ns):null;}

  function renderPrices(){
    const ab=document.getElementById('adminBtn');
    ab.textContent = isAdmin ? (editMode?'✓ Готово':'✏️ Редагувати') : '🔒';
    const html = CATS.map((c,ci)=>{
      const rows = priceRows.filter(r=>r.category===c.name);
      const groups=[];
      rows.forEach(r=>{const k=r.subcategory||'';let g=groups.find(x=>x.k===k);if(!g){g={k:k,items:[]};groups.push(g);}g.items.push(r);});
      let body = groups.map(g=>{
        const gt = g.k ? '<div class="grp-title">'+esc(g.k)+'</div>' : '';
        const items = g.items.map(r=>{
          const ed = isAdmin&&editMode;
          return '<div class="row'+(ed?' editable':'')+'"'+(ed?(' onclick="openEdit(\''+r.id+'\')"'):'')+'>'+
            '<span>'+esc(r.name)+'</span><span class="v">'+esc(r.price)+' <small>грн</small>'+(ed?'<span class="pen">✏️</span>':'')+'</span></div>';
        }).join('');
        return gt+items;
      }).join('');
      if(rows.length===0) body='<div class="ov-note" style="margin:10px 0 0">Поки порожньо</div>';
      const addBtn = (isAdmin&&editMode) ? '<button class="add-row" onclick="openAdd('+ci+')">+ Додати послугу</button>' : '';
      const from = fromPrice(c.name);
      const fl = from!==null ? ('від '+from+' грн · '+c.sub) : c.sub;
      return '<div class="cat" id="cat'+ci+'"><div class="cat-head" onclick="toggleCat('+ci+')">'+
        '<div class="cat-ic"><svg viewBox="0 0 24 24">'+c.icon+'</svg></div>'+
        '<div><div class="cat-name">'+c.name+'</div><div class="cat-from">'+fl+'</div></div>'+
        '<div class="cat-chev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 9l6 6 6-6" stroke-linecap="round"/></svg></div></div>'+
        '<div class="cat-body">'+body+addBtn+'</div></div>';
    }).join('');
    document.getElementById('catList').innerHTML = html;
  }
  function toggleCat(i){document.getElementById('cat'+i).classList.toggle('open');}
  async function openPrices(){document.getElementById('pricesScreen').classList.add('open');tg?.BackButton?.show?.();
    document.getElementById('catList').innerHTML='<div class="ov-note" style="margin-left:0">Завантаження…</div>';await fetchPrices();renderPrices();}
  function closePrices(){document.getElementById('pricesScreen').classList.remove('open');tg?.BackButton?.hide?.();}
  tg?.BackButton?.onClick?.(closePrices);

  function adminToggle(){
    if(!isAdmin){const p=prompt('PIN адміна:');if(p===ADMIN_PIN){isAdmin=true;editMode=true;}else if(p!==null){note('Невірний PIN');}}
    else{editMode=!editMode;}
    renderPrices();
  }
  function fillCatSelect(sel){const s=document.getElementById('fCat');s.innerHTML=CATS.map(c=>'<option value="'+esc(c.name)+'"'+(c.name===sel?' selected':'')+'>'+esc(c.name)+'</option>').join('');}
  function openEdit(id){const r=priceRows.find(x=>x.id===id);if(!r)return;editId=id;
    document.getElementById('modalTitle').textContent='Редагувати послугу';
    fillCatSelect(r.category);document.getElementById('fSub').value=r.subcategory||'';
    document.getElementById('fName').value=r.name;document.getElementById('fPrice').value=r.price;
    document.getElementById('fDelete').style.display='block';
    document.getElementById('editModal').classList.add('open');}
  function openAdd(ci){editId=null;
    document.getElementById('modalTitle').textContent='Нова послуга';
    fillCatSelect(CATS[ci].name);document.getElementById('fSub').value='';
    document.getElementById('fName').value='';document.getElementById('fPrice').value='';
    document.getElementById('fDelete').style.display='none';
    document.getElementById('editModal').classList.add('open');}
  function closeEdit(){document.getElementById('editModal').classList.remove('open');}
  async function saveEdit(){
    const cat=document.getElementById('fCat').value;
    const sub=document.getElementById('fSub').value.trim();
    const name=document.getElementById('fName').value.trim();
    const price=document.getElementById('fPrice').value.trim();
    if(!name||!price){note('Заповни назву і ціну');return;}
    const obj={category:cat,subcategory:sub||null,name:name,price:price};
    try{
      if(editId){await fetch(SUPABASE_URL+'/rest/v1/app_prices?id=eq.'+editId,{method:'PATCH',headers:{...H,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify(obj)});}
      else{const ms=priceRows.reduce((m,r)=>Math.max(m,r.sort||0),0);obj.sort=ms+1;
        await fetch(SUPABASE_URL+'/rest/v1/app_prices',{method:'POST',headers:{...H,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify(obj)});}
      closeEdit();await fetchPrices();renderPrices();
    }catch(e){note('Помилка збереження');}
  }
  function deleteRow(){if(!editId)return;ask('Видалити цю послугу?',async function(ok){if(!ok)return;
    try{await fetch(SUPABASE_URL+'/rest/v1/app_prices?id=eq.'+editId,{method:'DELETE',headers:{...H,Prefer:'return=minimal'}});
      closeEdit();await fetchPrices();renderPrices();}catch(e){note('Помилка видалення');}});}

  function open_(s){const t={record:'Онлайн запис',orders:'Мої замовлення',tires:'Підбір шин',bonus:'Бонуси',promo:'Акції та новини',map:'Як нас знайти',contact:'Зв\'язок'};
    note('«'+(t[s]||s)+'» — зробимо в наступному блоці.');}
</script>
</body>
</html>
