<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GT Tires Service</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     GT Tires Mini App — Блок 2: Головний екран
     Стиль: чорний + золото (#ffce1f), Montserrat
     ============================================================ */

  :root{
    --gold:#ffce1f;
    --gold-soft:rgba(255,206,31,.15);
    --bg:#0a0a0a;
    --card:#161616;
    --card-2:#1d1d1d;
    --line:#2a2a2a;
    --text:#f4f4f4;
    --muted:#8a8a8a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:'Montserrat',-apple-system,system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:18px 16px 40px;
    background-image:radial-gradient(120% 60% at 50% -10%, rgba(255,206,31,.10), transparent 60%);
  }

  /* ---------- Логотип ---------- */
  .logo{
    text-align:center;
    font-weight:900;
    font-size:30px;
    letter-spacing:1px;
    margin-bottom:4px;
  }
  .logo span{color:var(--gold);}
  .tagline{
    text-align:center;
    color:var(--muted);
    font-size:11px;
    letter-spacing:3px;
    text-transform:uppercase;
    margin-bottom:18px;
  }

  /* ---------- Індикатор завантаженості ---------- */
  .status{
    background:linear-gradient(145deg,var(--card),var(--card-2));
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px 16px;
    margin-bottom:18px;
  }
  .status-top{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
  .dot{
    width:11px;height:11px;border-radius:50%;
    background:#37d67a;flex-shrink:0;
    box-shadow:0 0 0 0 rgba(55,214,122,.6);
    animation:pulse 1.8s infinite;
  }
  .dot.closed{background:#e34; animation:none; box-shadow:none;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(55,214,122,.55);}
    70%{box-shadow:0 0 0 9px rgba(55,214,122,0);}
    100%{box-shadow:0 0 0 0 rgba(55,214,122,0);}
  }
  .status-text{font-weight:700;font-size:14px;}
  .status-sub{color:var(--muted);font-size:12px;margin-left:auto;}
  .bar{height:7px;background:#000;border-radius:6px;overflow:hidden;}
  .bar-fill{
    height:100%;width:45%;border-radius:6px;
    background:linear-gradient(90deg,#37d67a,var(--gold));
    transition:width .6s ease;
  }

  /* ---------- Привітання ---------- */
  .hello{font-size:15px;margin-bottom:14px;}
  .hello b{color:var(--gold);}

  /* ---------- Кнопки ---------- */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .btn{
    background:linear-gradient(145deg,var(--card),var(--card-2));
    border:1px solid var(--line);
    border-radius:16px;
    padding:18px 14px;
    display:flex;flex-direction:column;align-items:center;gap:10px;
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    position:relative;
  }
  .btn:active{
    transform:scale(.97);
    border-color:var(--gold);
    box-shadow:0 0 18px var(--gold-soft);
  }
  .btn svg{width:30px;height:30px;stroke:var(--gold);fill:none;stroke-width:1.7;}
  .btn span{font-size:13px;font-weight:700;text-align:center;}

  .btn.wide{grid-column:1 / -1;flex-direction:row;justify-content:center;padding:18px;}
  .btn.wide svg{width:26px;height:26px;}
  .btn.wide span{font-size:15px;}
  .btn.primary{
    background:linear-gradient(135deg,#ffce1f,#f0a500);
    border:none;
  }
  .btn.primary svg{stroke:#0a0a0a;}
  .btn.primary span{color:#0a0a0a;font-weight:900;}
  .badge{
    position:absolute;top:-7px;right:14px;
    background:#0a0a0a;color:var(--gold);
    font-size:10px;font-weight:900;
    padding:3px 8px;border-radius:20px;
    border:1px solid var(--gold);
  }
  .footer{text-align:center;color:var(--muted);font-size:11px;margin-top:24px;}
</style>
</head>
<body>

  <!-- =====================================================
       CONFIG — встав сюди значення з Supabase (Settings → API)
       ===================================================== -->
  <script>
    const SUPABASE_URL = "ВСТАВ_СЮДИ_PROJECT_URL";   // напр. https://abcd1234.supabase.co
    const SUPABASE_KEY = "ВСТАВ_СЮДИ_ANON_PUBLIC_KEY"; // ключ що починається на eyJ...
  </script>

  <div class="logo">GT <span>TIRES</span></div>
  <div class="tagline">Шиномонтаж · Велика Димерка</div>

  <!-- Індикатор завантаженості (поки демо — підключимо до gt_queue у наступному блоці) -->
  <div class="status">
    <div class="status-top">
      <div class="dot" id="dot"></div>
      <div class="status-text" id="statusText">Відчинено</div>
      <div class="status-sub" id="statusSub">до 20:00</div>
    </div>
    <div class="bar"><div class="bar-fill" id="barFill" style="width:45%"></div></div>
  </div>

  <div class="hello">Вітаємо, <b id="userName">друже</b>! Чим допомогти?</div>

  <div class="grid">

    <!-- Запис — широка кнопка з бейджем -->
    <button class="btn wide primary" onclick="open_('record')">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg>
      <span>Записатися</span>
      <div class="badge" style="color:#0a0a0a;background:#0a0a0a;border-color:#0a0a0a;display:none"></div>
    </button>

    <button class="btn" onclick="open_('orders')">
      <svg viewBox="0 0 24 24"><path d="M9 5h6M5 5h.01M5 12h.01M5 19h.01M9 12h6M9 19h6" stroke-linecap="round"/></svg>
      <span>Мої замовлення</span>
    </button>

    <button class="btn" onclick="open_('tires')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3.2"/></svg>
      <span>Підібрати шини</span>
    </button>

    <button class="btn" onclick="open_('prices')">
      <svg viewBox="0 0 24 24"><path d="M3 8l9-5 9 5v9l-9 5-9-5V8z"/><path d="M9 13h4M11 9v8" stroke-linecap="round"/></svg>
      <span>Актуальні ціни</span>
    </button>

    <button class="btn" onclick="open_('bonus')">
      <svg viewBox="0 0 24 24"><path d="M12 3l2.5 5.5L20 9l-4 4 1 6-5-3-5 3 1-6-4-4 5.5-.5L12 3z" stroke-linejoin="round"/></svg>
      <span>Бонуси</span>
    </button>

    <button class="btn" onclick="open_('promo')">
      <svg viewBox="0 0 24 24"><path d="M12 3c1 3-2 4-2 7a4 4 0 008 0c0-2-1-3-2-4 0 2-1 3-2 3 0-3 1-4 0-6z" stroke-linejoin="round"/></svg>
      <span>Акції</span>
    </button>

    <button class="btn" onclick="open_('map')">
      <svg viewBox="0 0 24 24"><path d="M12 21s7-5.5 7-11a7 7 0 10-14 0c0 5.5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>
      <span>Як нас знайти</span>
    </button>

    <!-- Зв'язок — широка кнопка знизу -->
    <button class="btn wide" onclick="open_('contact')">
      <svg viewBox="0 0 24 24"><path d="M6 4h3l1.5 4-2 1.5a11 11 0 005 5l1.5-2 4 1.5V18a2 2 0 01-2 2A15 15 0 014 6a2 2 0 012-2z" stroke-linejoin="round"/></svg>
      <span>Зв'язатися з нами</span>
    </button>

  </div>

  <div class="footer">GT Tires Service · Соборна 106, Велика Димерка</div>

<script>
  // --- Telegram WebApp ---
  const tg = window.Telegram?.WebApp;
  if (tg){
    tg.expand();
    tg.setHeaderColor?.('#0a0a0a');
    tg.setBackgroundColor?.('#0a0a0a');
    const name = tg.initDataUnsafe?.user?.first_name;
    if (name) document.getElementById('userName').textContent = name;
  }

  // --- Заглушки розділів (замінимо у Блоках 3–8) ---
  function open_(section){
    const titles = {
      record:'Онлайн запис', orders:'Мої замовлення', tires:'Підбір шин',
      prices:'Актуальні ціни', bonus:'Бонусна система', promo:'Акції',
      map:'Як нас знайти', contact:'Зв\'язок'
    };
    const msg = '«' + (titles[section]||section) + '» — зробимо в наступному блоці.';
    if (tg?.showAlert) tg.showAlert(msg); else alert(msg);
  }
</script>
</body>
</html>
