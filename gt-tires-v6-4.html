<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GT Tires V5 — Адмінка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#e81f29;--accent-2:#ff424c;--accent-soft:rgba(232,31,41,.14);--accent-glow:rgba(232,31,41,.55);
  --bg:#0a0707;--bg-2:#0e0a0a;--panel:#150f0f;--panel-2:#1a1313;
  --line:rgba(255,255,255,.06);--line-2:rgba(255,255,255,.09);
  --txt:#f3eeee;--muted:#8a8081;--muted-2:#6a6263;
  --good:#22b36b;--warn:#f0a92b;--info:#3a7bff;--radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:radial-gradient(1200px 700px at 22% 30%,rgba(232,31,41,.05),transparent 60%),var(--bg);
  color:var(--txt);-webkit-font-smoothing:antialiased;overflow:hidden}
.bebas{font-family:'Bebas Neue',Impact,sans-serif;letter-spacing:.04em}
#appBg{position:fixed;inset:0;z-index:0;background:#0a0707 center/cover no-repeat;display:none;pointer-events:none}
#appBg::after{content:'';position:absolute;inset:0;background:rgba(8,5,5,var(--bgdim,.8))}
body.has-bg #appBg{display:block}
body.has-bg .app{position:relative;z-index:1;background:transparent}
body.has-bg .topbar,body.has-bg .statusbar{background:rgba(12,8,8,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
body.has-bg .card,body.has-bg .dstat{background:rgba(16,10,10,.92)}
body.has-bg .modal{background:rgba(16,10,10,.97)}
body.has-bg .sidebar{background:rgba(12,8,8,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
body.has-bg .main{background:transparent}
a{color:inherit}
button{font-family:inherit}

.app{display:grid;grid-template-columns:264px 1fr;grid-template-rows:74px 1fr 44px;height:100vh}

/* topbar */
.topbar{grid-column:1/-1;display:flex;align-items:center;gap:22px;padding:0 26px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--bg-2),var(--bg))}
.brand{display:flex;align-items:center;gap:12px;min-width:200px}
.logo-mark{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;background:radial-gradient(circle at 50% 40%,#2a1414,#120909);border:1px solid rgba(232,31,41,.4);box-shadow:0 0 16px var(--accent-glow),inset 0 0 10px rgba(0,0,0,.6)}
.logo-mark svg{width:24px;height:24px}
.brand h1{font-size:25px;line-height:.9;font-weight:800}
.brand h1 .gt{color:var(--accent)}
.brand small{display:block;font-size:9px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;margin-top:3px}
.search{flex:1;position:relative;max-width:560px}
.search input{width:100%;height:46px;border-radius:14px;border:1px solid var(--line-2);background:var(--panel);color:var(--txt);padding:0 16px 0 44px;font-size:14px;outline:none;transition:.2s}
.search input::placeholder{color:var(--muted-2)}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.search .ic-left{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted)}
.topbar-right{display:flex;align-items:center;gap:16px;margin-left:auto}
.datetime{text-align:right}
.datetime .d{font-weight:700;font-size:15px}
.datetime .w{font-size:11px;color:var(--muted)}
.icon-btn{position:relative;width:44px;height:44px;border-radius:50%;display:grid;place-items:center;background:var(--panel);border:1px solid var(--line-2);color:var(--muted);cursor:pointer;transition:.2s}
.icon-btn:hover{color:var(--txt);border-color:var(--accent)}
.badge-dot{position:absolute;top:-3px;right:-3px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;box-shadow:0 0 10px var(--accent-glow)}
.view-toggle{display:flex;gap:2px;padding:3px;border:1px solid var(--line-2);border-radius:11px;background:var(--panel)}
.view-toggle button{border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:8px;height:34px;padding:0 12px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;transition:.15s}
.view-toggle button svg{width:16px;height:16px}
.view-toggle button:hover{color:var(--txt)}
.view-toggle button.on{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;box-shadow:0 0 12px var(--accent-glow)}
.hamburger{display:none;width:44px;height:44px;border-radius:11px;place-items:center;background:var(--panel);border:1px solid var(--line-2);color:var(--txt);cursor:pointer}
.hamburger svg{width:22px;height:22px}

/* sidebar */
.sidebar{border-right:1px solid var(--line);padding:18px 16px;display:flex;flex-direction:column;gap:16px;background:linear-gradient(180deg,var(--bg-2),var(--bg));overflow-y:auto}
.new-order-btn{height:66px;border:none;border-radius:16px;cursor:pointer;color:#fff;font-weight:800;font-size:18px;letter-spacing:.02em;display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 8px 26px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,.25);transition:.15s}
.new-order-btn:hover{transform:translateY(-1px)}
.nav{display:flex;flex-direction:column;gap:4px}
.nav a{display:flex;align-items:center;gap:14px;height:46px;padding:0 14px;border-radius:12px;color:var(--muted);text-decoration:none;font-size:14.5px;font-weight:500;cursor:pointer;transition:.18s}
.nav a svg{width:20px;height:20px;flex:none}
.nav a:hover{background:var(--panel);color:var(--txt)}
.nav a.active{color:#fff;background:linear-gradient(90deg,var(--accent-soft),transparent);border:1px solid rgba(232,31,41,.35);box-shadow:inset 0 0 16px var(--accent-soft)}
.nav a.active svg{color:var(--accent)}
.nav .count{margin-left:auto;background:var(--accent);color:#fff;font-size:11px;font-weight:700;border-radius:8px;padding:2px 7px}
.nav a:not(.active) .count{background:var(--panel-2);color:var(--muted)}
.theme-box{margin-top:auto;border:1px solid var(--line);border-radius:14px;padding:14px;background:var(--panel)}
.theme-box .t-title{font-size:11px;color:var(--muted);margin-bottom:10px;letter-spacing:.06em}
.swatches{display:flex;gap:10px}
.swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s}
.swatch:hover{transform:scale(1.12)}
.swatch.sel{border-color:#fff;box-shadow:0 0 12px currentColor}
.sw-red{background:#e81f29;color:#e81f29}.sw-yellow{background:#f0a92b;color:#f0a92b}.sw-blue{background:#3a7bff;color:#3a7bff}.sw-green{background:#22b36b;color:#22b36b}.sw-purple{background:#9b3aff;color:#9b3aff}
.profile{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:14px;padding:10px 12px;background:var(--panel)}
.profile .ava{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-family:'Bebas Neue';font-size:18px;color:#fff;background:linear-gradient(135deg,#2a1414,#140a0a);border:1px solid var(--accent);position:relative}
.profile .ava::after{content:"";position:absolute;right:-1px;bottom:-1px;width:11px;height:11px;border-radius:50%;background:var(--good);border:2px solid var(--panel)}
.profile .pn{font-weight:700;font-size:14px}
.profile .pr{font-size:11px;color:var(--muted)}

/* main */
.main{padding:22px 26px;overflow-y:auto}
#view{display:flex;flex-direction:column;gap:18px}

/* generic */
.page-h{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.page-h h2{font-family:'Bebas Neue';font-size:30px;letter-spacing:.04em}
.page-h .sub{color:var(--muted);font-size:13px}
.page-h .spacer{flex:1}
.btn{height:44px;border:none;border-radius:12px;cursor:pointer;color:#fff;font-weight:700;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0 18px;background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 6px 18px var(--accent-glow);transition:.15s}
.btn:hover{transform:translateY(-1px)}
.btn svg{width:18px;height:18px}
.btn.ghost{background:rgba(255,255,255,.04);border:1px solid var(--line-2);box-shadow:none;color:var(--txt)}
.btn.ghost:hover{border-color:var(--accent)}
.btn.sm{height:36px;padding:0 13px;font-size:13px}
.btn.danger{background:linear-gradient(135deg,#b3202a,#e0303b)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.stat{border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;background:var(--panel);display:flex;flex-direction:column;gap:12px;overflow:hidden}
.stat .lbl{font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.stat .lbl svg{width:22px;height:22px;color:var(--muted-2)}
.stat .val{font-size:30px;font-weight:800;display:flex;align-items:baseline;gap:8px;white-space:nowrap;font-variant-numeric:tabular-nums}
.stat .val .delta{font-size:13px;font-weight:600;color:var(--good)}
.stat.is-accent{border-color:rgba(232,31,41,.4);background:linear-gradient(180deg,var(--accent-soft),var(--panel));box-shadow:inset 0 0 24px var(--accent-soft)}
.stat.is-accent svg{color:var(--accent)}

.cols{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
.lcol,.rcol{display:flex;flex-direction:column;gap:18px}
.card{border:1px solid var(--line);border-radius:var(--radius);background:var(--panel)}
.card-h{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)}
.card-h h3{font-size:15px;letter-spacing:.08em;text-transform:uppercase;font-weight:700}
.card-h a{font-size:11px;color:var(--accent);text-decoration:none;letter-spacing:.06em;cursor:pointer}
.card-pad{padding:18px 20px}

/* hero */
.hero{position:relative;overflow:hidden;border:1px solid rgba(232,31,41,.4);border-radius:var(--radius);padding:24px;min-height:300px;display:flex;flex-direction:column;background:radial-gradient(420px 280px at 28% 70%,var(--accent-soft),transparent 70%),linear-gradient(180deg,#1c0e0e,#120909);box-shadow:inset 0 0 40px rgba(232,31,41,.1)}
.hero h2{font-family:'Bebas Neue';font-size:30px;letter-spacing:.05em}
.hero-body{display:flex;align-items:center;gap:22px;margin-top:14px;flex:1}
.tire{width:200px;height:200px;flex:none;border-radius:50%;position:relative;background:radial-gradient(circle at 50% 42%,#444 0 19%,#1c1c1c 19% 21%,#2a2a2a 21% 30%,#0d0d0d 30% 33%,#1a1a1a 33% 60%,#060606 60% 100%);box-shadow:0 0 50px var(--accent-glow),inset 0 0 30px rgba(0,0,0,.9),0 24px 40px rgba(0,0,0,.6);animation:spin 14s linear infinite}
.tire::before{content:"";position:absolute;inset:31%;border-radius:50%;background:conic-gradient(from 0deg,#2b2b2b 0 8deg,#0c0c0c 8deg 45deg,#2b2b2b 45deg 53deg,#0c0c0c 53deg 90deg,#2b2b2b 90deg 98deg,#0c0c0c 98deg 135deg,#2b2b2b 135deg 143deg,#0c0c0c 143deg 180deg,#2b2b2b 180deg 188deg,#0c0c0c 188deg 225deg,#2b2b2b 225deg 233deg,#0c0c0c 233deg 270deg,#2b2b2b 270deg 278deg,#0c0c0c 278deg 315deg,#2b2b2b 315deg 323deg,#0c0c0c 323deg 360deg);box-shadow:inset 0 0 16px rgba(0,0,0,.9)}
.tire::after{content:"";position:absolute;inset:44%;border-radius:50%;background:radial-gradient(circle,#3a3a3a,#0a0a0a);border:1px solid rgba(232,31,41,.5);box-shadow:0 0 14px var(--accent-glow)}
@keyframes spin{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.tire{animation:none}}
.hero-actions{display:flex;flex-direction:column;gap:12px;flex:1;max-width:230px}
.btn-accent{height:54px;border:none;border-radius:13px;cursor:pointer;color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;gap:9px;background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 8px 24px var(--accent-glow);transition:.15s}
.btn-accent:hover{transform:translateY(-1px)}
.btn-ghost{height:50px;border:1px solid var(--line-2);border-radius:13px;cursor:pointer;color:var(--txt);font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;gap:9px;background:rgba(255,255,255,.03);transition:.2s}
.btn-ghost:hover{border-color:var(--accent);color:#fff}

/* posts */
.posts{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:18px 20px}
.post{border:1px solid var(--line);border-radius:14px;padding:14px 12px;text-align:center;background:var(--bg-2)}
.post .pt{font-weight:700;font-size:14px}
.post .ps{font-size:11px;color:var(--muted);margin-bottom:12px}
.ring{width:78px;height:78px;margin:0 auto;border-radius:50%;display:grid;place-items:center;position:relative;background:conic-gradient(var(--c) calc(var(--p)*1%),rgba(255,255,255,.08) 0)}
.ring::before{content:"";position:absolute;inset:9px;border-radius:50%;background:var(--panel)}
.ring span{position:relative;font-weight:800;font-size:18px}
.post .free{margin-top:10px;font-size:12px;font-weight:600}

/* lists */
.row-list{padding:6px 8px 10px}
.olist-row{display:grid;grid-template-columns:64px 1fr 100px 90px 52px 36px;align-items:center;gap:8px;padding:11px 12px;border-radius:11px;transition:.15s;cursor:pointer}
.olist-row:hover{background:var(--bg-2)}
.olist-row .id{color:var(--muted);font-size:13px;font-variant-numeric:tabular-nums}
.olist-row .nm{font-weight:600;font-size:14px}
.olist-row .plate{font-size:11px;color:var(--muted);letter-spacing:.05em}
.olist-row .amt{font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.olist-row .tm{color:var(--muted);font-size:12px;text-align:right}
.mini{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:transparent;border:1px solid var(--line-2);color:var(--muted);cursor:pointer}
.mini:hover{color:var(--txt);border-color:var(--accent)}
.mini svg{width:15px;height:15px}
.tag{font-size:11px;font-weight:700;padding:5px 10px;border-radius:8px;text-align:center;white-space:nowrap;cursor:pointer;border:none}
.tag.work{color:#7fb0ff;background:rgba(58,123,255,.14)}
.tag.wait{color:#ffcb6b;background:rgba(240,169,43,.14)}
.tag.done{color:#5fe0a0;background:rgba(34,179,107,.14)}

.svc-row{display:flex;align-items:center;gap:13px;padding:13px 20px;border-top:1px solid var(--line)}
.svc-row:first-child{border-top:none}
.svc-ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);flex:none}
.svc-ic svg{width:19px;height:19px}
.svc-row .sn{flex:1;font-weight:500;font-size:14px}
.svc-row .sp{font-weight:700;font-variant-numeric:tabular-nums}

.qa-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:18px 20px}
.qa{border:1px solid var(--line);border-radius:13px;padding:16px 8px;text-align:center;cursor:pointer;background:var(--bg-2);transition:.18s;display:flex;flex-direction:column;align-items:center;gap:9px}
.qa:hover{border-color:var(--accent);transform:translateY(-2px)}
.qa-ic{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;color:var(--accent);background:var(--accent-soft)}
.qa-ic svg{width:21px;height:21px}
.qa span{font-size:11.5px;color:var(--muted);line-height:1.3}

/* table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:12px 16px;border-bottom:1px solid var(--line)}
.tbl td{padding:13px 16px;border-bottom:1px solid var(--line);font-size:14px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg-2)}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.tbl .actions{text-align:right;white-space:nowrap}
.tbl .actions .mini{display:inline-grid;margin-left:6px}
.empty{padding:50px 20px;text-align:center;color:var(--muted)}
.empty .big{font-size:40px;margin-bottom:10px;opacity:.5}
.chip{display:inline-block;font-size:11px;padding:3px 9px;border-radius:7px;background:var(--accent-soft);color:var(--accent);font-weight:600}

/* chart */
.chart{display:flex;align-items:flex-end;gap:10px;height:180px;padding:18px 20px 12px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
.bar{width:100%;max-width:46px;border-radius:8px 8px 0 0;background:linear-gradient(180deg,var(--accent-2),var(--accent));min-height:4px;box-shadow:0 0 14px var(--accent-glow);transition:height .4s}
.bar-col .lab{font-size:11px;color:var(--muted)}
.bar-col .v{font-size:11px;color:var(--txt);font-weight:600}

/* forms / modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.66);backdrop-filter:blur(3px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-bg.show{display:flex}
.modal{width:560px;max-width:100%;background:var(--panel-2);border:1px solid var(--line-2);border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
.modal-h h3{font-family:'Bebas Neue';font-size:22px;letter-spacing:.04em}
.modal-h .x{cursor:pointer;color:var(--muted);width:32px;height:32px;display:grid;place-items:center;border-radius:8px}
.modal-h .x:hover{color:var(--txt);background:var(--bg-2)}
.modal-b{padding:22px;display:flex;flex-direction:column;gap:14px;max-height:64vh;overflow-y:auto}
.modal-f{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.field{display:flex;flex-direction:column;gap:6px}
.field.row{flex-direction:row;gap:12px}
.field.row .field{flex:1}
.field label{font-size:12px;color:var(--muted);font-weight:500}
.field input,.field select,.field textarea{height:48px;border:1.5px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);color:var(--txt);border-radius:12px;padding:0 14px;font-size:17px;outline:none;font-family:inherit;transition:.15s}
.field input::placeholder,.field textarea::placeholder{color:rgba(255,255,255,.42)}
.field select{appearance:none;-webkit-appearance:none}
.field textarea{height:72px;padding:10px 14px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:rgba(255,255,255,.12);box-shadow:0 0 0 3px var(--accent-soft)}
.svc-pick{border:1px solid var(--line-2);border-radius:12px;max-height:230px;overflow-y:auto;background:var(--bg-2)}
.svc-pick .pr{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line)}
.svc-pick .pr:last-child{border-bottom:none}
.svc-pick .pr .nm{flex:1;font-size:14px}
.svc-pick .pr .pp{color:var(--muted);font-size:13px;width:70px;text-align:right;font-variant-numeric:tabular-nums}
.qty{display:flex;align-items:center;gap:6px}
.qty button{width:28px;height:28px;border-radius:8px;border:1px solid var(--line-2);background:var(--panel);color:var(--txt);cursor:pointer;font-size:16px;line-height:1}
.qty span{width:24px;text-align:center;font-variant-numeric:tabular-nums}
.total-line{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:12px;background:var(--accent-soft);border:1px solid rgba(232,31,41,.3)}
.total-line .t{font-size:13px;color:var(--muted)}
.total-line .v{font-family:'Bebas Neue';font-size:26px;color:var(--accent)}
.checkbox{display:flex;align-items:center;gap:9px;font-size:14px;cursor:pointer}
.checkbox input{width:18px;height:18px;accent-color:var(--accent)}

/* toast */
#toast{position:fixed;top:84px;left:50%;max-width:92vw;transform:translateX(-50%) translateY(-16px);background:var(--panel-2);border:1px solid var(--accent);color:var(--txt);padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 12px 30px rgba(0,0,0,.5),0 0 20px var(--accent-soft);opacity:0;pointer-events:none;transition:.25s;z-index:200}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* statusbar */
.statusbar{grid-column:1/-1;display:flex;align-items:center;gap:14px;padding:0 24px;border-top:1px solid var(--line);background:linear-gradient(180deg,var(--bg),#160b0b);font-size:13px}
.pill-rem{display:inline-flex;align-items:center;height:24px;padding:0 12px;border-radius:7px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;letter-spacing:.05em;box-shadow:0 0 14px var(--accent-glow)}
.statusbar .rtxt{color:var(--muted)}.statusbar .rtxt b{color:var(--txt)}
.statusbar .right{margin-left:auto;display:flex;align-items:center;gap:18px;color:var(--muted)}
.online{display:inline-flex;align-items:center;gap:7px}
.online::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--good);box-shadow:0 0 8px var(--good)}

/* ---------- order editor ---------- */
.olines{display:flex;flex-direction:column;gap:6px}
.oline{display:grid;grid-template-columns:1fr 78px 96px 74px 28px;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--line-2);border-radius:11px;background:var(--bg-2)}
.oline .onm{font-size:14px}
.oprice{height:36px;width:100%;border:1px solid var(--line-2);background:var(--panel);color:var(--txt);border-radius:8px;padding:0 8px;font-size:14px;text-align:right;font-variant-numeric:tabular-nums;outline:none}
.oprice:focus{border-color:var(--accent)}
.oline .osum{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.pk-g{font-weight:700;font-size:13px;padding:10px 12px 4px;color:var(--accent)}
.pk-sub{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:7px 12px 3px;background:var(--panel)}
body.is-mobile .oline{grid-template-columns:1fr 60px 80px 24px}
body.is-mobile .oline .osum{display:none}
/* ---------- design editor ---------- */
body.no-shadow *{box-shadow:none!important}
body.glass .card,body.glass .dstat,body.glass .stat,body.glass .modal{background:rgba(255,255,255,.07);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-color:rgba(255,255,255,.14)}
body.glass.light .card,body.glass.light .dstat,body.glass.light .stat,body.glass.light .modal{background:rgba(255,255,255,.55);border-color:rgba(0,0,0,.08)}
.card,.dstat,.stat,.modal,.tile,.qa,.btn,.new-order-btn{border-radius:var(--radius,16px)}
body.light .field input,body.light .field select,body.light .field textarea{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.16);color:var(--txt)}
body.light .field input::placeholder,body.light .field textarea::placeholder{color:rgba(0,0,0,.4)}
body.light .topbar,body.light .sidebar{background:linear-gradient(180deg,var(--panel),var(--bg))}
body.light .oprice{background:#fff;color:#111}
body.light .modal-bg{background:rgba(20,20,30,.45)}
body.light .tile.wide,body.light .dh-voice{color:#15151a}
.design-themes{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dth{border:1.5px solid var(--line-2);border-radius:14px;padding:11px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;background:var(--panel);transition:.15s}
.dth.sel{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.dth .sw{width:32px;height:32px;border-radius:9px;flex:none}
.dth .nm2{font-size:13px;font-weight:700;color:var(--txt)}
.dsw{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:11px 14px;border:1px solid var(--line-2);border-radius:12px;background:var(--panel);font-size:14px;color:var(--txt)}
.toggle{width:48px;height:28px;border-radius:14px;background:var(--line-2);position:relative;cursor:pointer;transition:.2s;flex:none}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s}
.toggle.on::after{left:23px}
input[type=color]{width:56px;height:38px;border:1px solid var(--line-2);border-radius:9px;background:none;cursor:pointer;padding:2px}
/* ---------- dashboard ---------- */
.catgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.cat-tile{background:#07111C;border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:12px 8px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:transform .1s,border-color .15s;min-height:118px;justify-content:flex-end}
.cat-tile:active{transform:scale(.96)}
.cat-tile:hover{border-color:var(--accent)}
.cat-tile img{height:64px;max-width:92%;object-fit:contain;filter:drop-shadow(0 6px 14px rgba(0,0,0,.55))}
.cat-tile span{font-size:12.5px;font-weight:700;color:var(--txt);text-align:center;line-height:1.15}
@media(min-width:700px){.catgrid{grid-template-columns:repeat(5,1fr)}}

.dash{display:flex;flex-direction:column;gap:11px;padding-bottom:88px;max-width:720px;margin:0 auto;width:100%}
.dash-hero{border-radius:18px;padding:15px 16px;background:linear-gradient(135deg,var(--accent),var(--accent-2));position:relative;overflow:hidden;box-shadow:0 10px 26px var(--accent-glow)}
.dash-hero::after{content:'';position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.13)}
.dash-hero::before{content:'';position:absolute;right:36px;bottom:-50px;width:100px;height:100px;border-radius:50%;background:rgba(0,0,0,.10)}
.dh-top{position:relative;z-index:1;margin-bottom:12px}
.dh-hi{font-size:18px;font-weight:800;color:#fff}
.dh-date{font-size:12px;color:rgba(255,255,255,.82);margin-top:2px;text-transform:capitalize}
.dh-actions{position:relative;z-index:1;display:flex;gap:9px}
.dh-voice,.dh-new{height:48px;border:none;border-radius:13px;font-weight:800;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .1s}
.dh-voice:active,.dh-new:active{transform:scale(.97)}
.dh-voice{flex:1.7;background:#fff;color:#15151a}
.dh-new{flex:1;background:rgba(0,0,0,.22);color:#fff;border:1px solid rgba(255,255,255,.35)}
.dh-voice svg,.dh-new svg{width:19px;height:19px}
.dash-stats{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.dstat{background:var(--panel);border:1px solid var(--line-2);border-radius:14px;padding:12px 13px;position:relative;min-height:66px;display:flex;flex-direction:column;justify-content:center;gap:2px}
.dstat .di{position:absolute;right:12px;top:11px;font-size:16px;opacity:.85}
.dstat .dv{font-size:21px;font-weight:800;color:var(--txt);font-variant-numeric:tabular-nums;line-height:1.05}
.dstat .dl{font-size:11px;color:var(--muted)}
.dstat.acc{background:linear-gradient(135deg,var(--accent-soft),var(--panel))}
.dstat.acc .dv{color:var(--accent)}
.dstat.warn .dv{color:var(--warn)}
.dash .qa-ic{font-size:21px;display:grid;place-items:center}
.dash-empty{text-align:center;padding:22px 14px}
.dash-empty .de-ic{font-size:30px;margin-bottom:7px}
.dash-empty .de-t{font-weight:700;color:var(--txt);margin-bottom:4px}
.dash-empty .de-s{font-size:13px;color:var(--muted);line-height:1.5;max-width:300px;margin:0 auto}
/* ---------- tile picker ---------- */
.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;padding:2px}
.tile{border:none;border-radius:13px;min-height:54px;display:flex;flex-direction:row;align-items:center;justify-content:center;gap:9px;cursor:pointer;color:#fff;text-align:left;font-weight:700;font-size:13px;line-height:1.15;padding:8px 12px;box-shadow:0 5px 14px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.2);transition:transform .1s}
.tile:active{transform:scale(.96)}
.tile .ic{font-size:21px;line-height:1;flex:none}
.tile.svc{justify-content:flex-start}
.tile.svc .tn{flex:1;min-width:0}
.tile .pr2{font-weight:800;font-size:13px;opacity:.96;flex:none;white-space:nowrap}
.tile .un{font-size:11px;opacity:.85}
.tile.wide{grid-column:1/-1;min-height:48px;font-size:14px;background:rgba(255,255,255,.05);box-shadow:none;border:1px dashed var(--line-2);color:var(--txt)}
.pick-crumb{font-size:12px;color:var(--accent);font-weight:600;margin-bottom:10px}
@media (max-width:600px){.field.row{flex-direction:column;gap:14px}.modal{width:100%}}
/* ---------- voice ---------- */
.voice-btn{height:60px;border:none;border-radius:15px;cursor:pointer;color:#fff;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;gap:11px;letter-spacing:.02em;background:linear-gradient(135deg,#5e0c11,#e81f29);box-shadow:0 8px 24px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,.18);transition:.15s}
.voice-btn:hover{transform:translateY(-1px)}
.voice-btn .mi{font-size:21px}
.fab{position:fixed;right:26px;bottom:62px;width:68px;height:68px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;box-shadow:0 12px 34px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,.25);display:grid;place-items:center;z-index:80;transition:.15s}
.fab:hover{transform:scale(1.06)}
.fab svg{width:30px;height:30px}
body.is-mobile .fab{bottom:108px;right:16px}
.mic-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:6px 0}
.mic-big{width:148px;height:148px;border-radius:50%;border:none;cursor:pointer;background:radial-gradient(circle at 50% 38%,#ff4751,#b3101a);color:#fff;display:grid;place-items:center;position:relative;box-shadow:0 14px 36px var(--accent-glow)}
.mic-big svg{width:62px;height:62px}
.mic-big.rec{animation:micpulse 1.2s infinite}
@keyframes micpulse{0%{box-shadow:0 0 0 0 rgba(232,31,41,.55)}70%{box-shadow:0 0 0 34px rgba(232,31,41,0)}100%{box-shadow:0 0 0 0 rgba(232,31,41,0)}}
.listening{font-size:15px;color:var(--accent);font-weight:700;letter-spacing:.04em;display:flex;align-items:center;gap:8px}
.listening .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);animation:micblink 1s infinite}
@keyframes micblink{50%{opacity:.2}}
.transcript{min-height:52px;width:100%;border:1px solid var(--line-2);border-radius:12px;background:var(--bg-2);padding:12px 14px;font-size:17px;color:var(--txt);text-align:center}
.transcript.empty{color:var(--muted-2);font-size:14px}
.vrow{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid var(--line-2);border-radius:12px;margin-bottom:8px;background:var(--bg-2)}
.vrow .nm{flex:1;font-size:15px}
.vrow .pp{color:var(--muted);font-variant-numeric:tabular-nums}
.vrow.miss{border-color:var(--warn);background:rgba(240,169,43,.08);flex-wrap:wrap}
.big-field{height:50px;font-size:16px}
.big-confirm{height:58px!important;font-size:17px;padding:0 26px}
.hint{font-size:12px;color:var(--muted);line-height:1.5}
.cmd-list{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cmd-chip{padding:11px 13px;border:1px solid var(--line-2);border-radius:11px;background:var(--bg-2);font-size:14px}
body.is-mobile .cmd-list{grid-template-columns:1fr}
body.is-mobile .modal-f{flex-wrap:wrap}
body.is-mobile .modal-f .btn{flex:1}

::-webkit-scrollbar{width:9px;height:9px}.oitem{display:grid;grid-template-columns:1fr 92px 92px 78px 30px;align-items:center;gap:8px;padding:9px 10px;border:1px solid var(--line-2);border-radius:11px;margin-bottom:7px;background:var(--bg-2)}
.oitem .oi-name{font-size:14px}
.oitem .oi-price{display:flex;align-items:center;gap:4px;color:var(--muted);justify-content:flex-end}
.oitem .oi-price input{width:66px;height:38px;border:1px solid var(--line-2);background:var(--panel);color:var(--txt);border-radius:9px;padding:0 8px;font-size:14px;text-align:right}
.oitem .oi-sum{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.sub-h{font-size:12px;color:var(--accent);font-weight:700;letter-spacing:.04em;padding:12px 16px 4px;text-transform:uppercase}
.svc-pick .pr .btn.sm{padding:0 12px;height:34px;flex:none}
body.is-mobile .oitem{grid-template-columns:1fr 76px 70px 26px}
body.is-mobile .oitem .oi-sum{display:none}::-webkit-scrollbar-thumb{background:rgba(232,31,41,.3);border-radius:9px}::-webkit-scrollbar-track{background:transparent}

.sidebar-backdrop{display:none;position:absolute;inset:0;background:rgba(0,0,0,.6);z-index:40;backdrop-filter:blur(2px)}
/* mobile mode */
body.is-mobile{display:flex;justify-content:center;background:#050404}
body.is-mobile .app{width:100%;max-width:430px;height:100vh;grid-template-columns:minmax(0,1fr);grid-template-rows:auto 1fr auto;position:relative;overflow:hidden;border-left:1px solid var(--line);border-right:1px solid var(--line)}
body.is-mobile .topbar{grid-column:1;flex-wrap:wrap;height:auto;padding:10px 12px;gap:8px}
body.is-mobile .brand small{display:none}
body.is-mobile .brand h1{font-size:19px}
body.is-mobile .logo-badge{width:38px;height:38px}
body.is-mobile .view-toggle button{padding:7px 9px;font-size:0;gap:0}
body.is-mobile .view-toggle button svg{width:17px;height:17px}
body.is-mobile .brand{min-width:0;flex:0 1 auto}
body.is-mobile .brand h1{font-size:17px}
body.is-mobile .topbar-right{gap:8px;min-width:0}
body.is-mobile .icon-btn{width:38px;height:38px}
body.is-mobile .datetime{display:none}
body.is-mobile .brand{min-width:0;flex:1}
body.is-mobile .brand h1{font-size:21px}
body.is-mobile .hamburger{display:grid}
body.is-mobile .search{flex-basis:100%;order:3;max-width:none}
body.is-mobile .datetime{display:none}
body.is-mobile .sidebar{position:absolute;top:0;left:0;bottom:0;width:280px;z-index:50;grid-column:auto;transform:translateX(-106%);transition:transform .25s ease}
body.is-mobile.nav-open .sidebar{transform:translateX(0);box-shadow:24px 0 60px rgba(0,0,0,.6)}
body.is-mobile.nav-open .sidebar-backdrop{display:block}
body.is-mobile .main{grid-column:1;padding:14px 12px;min-width:0;overflow-x:hidden}
body.is-mobile .stats{grid-template-columns:1fr 1fr}
body.is-mobile .stat{padding:14px 16px}
body.is-mobile .stat .val{font-size:25px;flex-wrap:wrap;gap:2px 8px}
body.is-mobile .cols{grid-template-columns:1fr}
body.is-mobile .hero{min-height:0;padding:20px}
body.is-mobile .hero-body{flex-direction:column;text-align:center;gap:18px}
body.is-mobile .tire{width:150px;height:150px}
body.is-mobile .hero-actions{max-width:none;width:100%}
body.is-mobile .posts{grid-template-columns:1fr 1fr}
body.is-mobile .qa-grid{grid-template-columns:repeat(3,1fr)}
body.is-mobile .olist-row{grid-template-columns:1fr auto auto;gap:6px}
body.is-mobile .olist-row .id,body.is-mobile .olist-row .tm{display:none}
body.is-mobile .modal{width:100%}
body.is-mobile .tbl thead{display:none}
body.is-mobile .tbl,body.is-mobile .tbl tbody{display:block;width:100%}
body.is-mobile .tbl tr{display:flex;flex-wrap:nowrap;align-items:center;justify-content:space-between;gap:8px;padding:11px 12px;border-bottom:1px solid var(--line)}
body.is-mobile .tbl tr:last-child{border-bottom:none}
body.is-mobile .tbl td{display:block;border:none;padding:0;flex:1;min-width:0}
body.is-mobile .tbl td.num{flex:0 0 auto;font-size:15px}
body.is-mobile .tbl td.actions{flex:0 0 auto}
body.is-mobile .tbl .actions .mini{width:42px;height:42px}
body.is-mobile .tbl .actions .mini svg{width:19px;height:19px}
body.is-mobile .statusbar{grid-column:1;flex-wrap:nowrap;height:auto;padding:9px 14px;gap:10px;font-size:12px}
body.is-mobile .statusbar .rtxt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
body.is-mobile .statusbar .right{margin-left:auto;flex:0 0 auto;gap:10px;white-space:nowrap}
</style>
</head>
<body>
<div id="appBg"></div>
<div class="app">
  <div class="sidebar-backdrop" id="navBackdrop"></div>

  <header class="topbar">
    <button class="hamburger" id="hamburger" title="Меню"><svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
    <div class="brand">
      <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="var(--accent)" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="var(--accent)"/><path d="M12 3v4M12 17v4M3 12h4M17 12h4" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/></svg></div>
      <div><h1 class="bebas"><span class="gt">GT</span> TIRES</h1><small>Шиномонтажний сервіс</small></div>
    </div>
    <div class="search">
      <span class="ic-left"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>
      <input type="text" id="search" placeholder="Пошук клієнта, авто, заказу...">
    </div>
    <div class="topbar-right">
      <div class="view-toggle" id="viewToggle">
        <button data-view="desktop" class="on" title="Вигляд для ПК"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M9 20h6M12 16v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>ПК</button>
        <button data-view="mobile" title="Вигляд для телефону"><svg viewBox="0 0 24 24" fill="none"><rect x="7" y="3" width="10" height="18" rx="2" stroke="currentColor" stroke-width="2"/><path d="M11 18h2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Моб</button>
      </div>
      <div class="datetime"><div class="d" id="clock">—</div><div class="w" id="weekday">—</div></div>
      <button class="icon-btn" data-act="route" data-route="marketing" title="Сповіщення"><span class="badge-dot" id="notifDot">0</span><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M10 20a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
      <button class="icon-btn" data-act="route" data-route="settings" title="Налаштування"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
    </div>
  </header>

  <aside class="sidebar">
    <button class="new-order-btn" data-act="newOrder"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/></svg>НОВИЙ ЗАКАЗ</button>
    <button class="voice-btn" data-act="voiceStart"><span class="mi">🎤</span> ГОЛОСОВА КОМАНДА</button>
    <nav class="nav" id="nav"></nav>
    <div class="theme-box">
      <div class="t-title">Тема дизайну</div>
      <div class="swatches" id="swatches">
        <div class="swatch sw-red" data-theme="red"></div>
        <div class="swatch sw-yellow" data-theme="yellow"></div>
        <div class="swatch sw-blue" data-theme="blue"></div>
        <div class="swatch sw-green" data-theme="green"></div>
        <div class="swatch sw-purple" data-theme="purple"></div>
      </div>
    </div>
    <div class="profile"><div class="ava bebas">GT</div><div><div class="pn">GT Admin</div><div class="pr">Адміністратор</div></div></div>
  </aside>

  <main class="main"><div id="view"></div></main>

  <footer class="statusbar">
    <span class="pill-rem">Нагадування</span>
    <span class="rtxt" id="reminderTxt">Все спокійно — активних нагадувань немає</span>
    <div class="right"><span>Версія 6.4 • меню GT</span><span class="online">Онлайн</span></div>
  </footer>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div id="toast"></div>
<input type="file" id="priceFile" accept=".csv,text/csv" style="display:none">
<input type="file" id="bgFile" accept="image/*" style="display:none">
<button class="fab" data-act="voiceStart" title="Голосова команда"><svg viewBox="0 0 24 24" fill="none"><rect x="9" y="3" width="6" height="11" rx="3" fill="#fff"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg></button>

<script>
"use strict";
/* ============ DATA ============ */
const LS_KEY='gt_tires_v5';
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const money=n=>'₴ '+Math.round(n||0).toLocaleString('uk-UA').replace(/,/g,' ');
const pad=n=>String(n).padStart(2,'0');
const today=()=>{const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());};
const dayKey=ts=>{const d=new Date(ts);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());};
const fmtDate=ts=>{const d=new Date(ts);return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear();};

function migrateSvc(s){
  if(s.group)return s;
  const n=(s.name||'').toLowerCase(),c=(s.category||'');
  let g='truck',sub='Ремонт шин';
  if(c==='Легковий монтаж'||/седан|мінівен|джип|кросовер|бус|комерц|спарован/i.test(n)){g='car';
    if(/suv|джип|мінівен|кросовер/i.test(n))sub='SUV / Кросовер';
    else if(/бус|комерц|спарован|газель/i.test(n))sub='Бус / Комерційний транспорт';
    else sub='Седан / Хетчбек / Універсал';}
  else if(c==='Вантажний монтаж'){g='truck';sub=/безкамер/i.test(n)?'Безкамерні':/камер/i.test(n)?'Камерні':'Слюсарні роботи';}
  else if(c==='Сільгосп / Спец'||c==='agri'){g=/великогабарит/i.test(n)?'spec':'agri';sub='Загальні';}
  else if(c==='Балансування вантаж'||/балансув/i.test(n))g='truck',sub='Балансування';
  else if(c==='Ремонт камер')g='truck',sub='Ремонт камер';
  else if(c==='Кріплення')g='truck',sub='Кріплення';
  else if(c==='Вентилі'||/вентил/i.test(n))g='truck',sub='Вентильна арматура';
  else if(c==='Рихтування дисків')g='truck',sub='Слюсарні роботи';
  s.group=g;s.sub=sub;return s;
}
function parseCSV(text){const rows=[];let i=0,field='',row=[],inq=false;text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  while(i<text.length){const ch=text[i];
    if(inq){if(ch==='"'){if(text[i+1]==='"'){field+='"';i+=2;continue;}inq=false;i++;continue;}field+=ch;i++;continue;}
    if(ch==='"'){inq=true;i++;continue;}
    if(ch===','){row.push(field);field='';i++;continue;}
    if(ch==='\n'){row.push(field);rows.push(row);row=[];field='';i++;continue;}
    field+=ch;i++;}
  if(field.length||row.length){row.push(field);rows.push(row);}return rows;}

function stats(){

  const doneToday=todays.filter(o=>o.paid);
  const avg=doneToday.length?revToday/doneToday.length:0;
  const active=S.orders.filter(o=>o.status!=='done').length;
  return {ordersToday:todays.length,revToday,avg,active};
}

  return S.settings.posts.map((name,i)=>{

    const c=p>=100?'#e81f29':p>=50?'#f0a92b':'#22b36b';
    return {name,p,c,busy:cnt>0,cnt};
  });
}

cash(){
  const balance=S.cash.reduce((a,c)=>a+(c.type==='in'?c.amount:-c.amount),0);
  const td=today();
  const inToday=S.cash.filter(c=>c.type==='in'&&dayKey(c.createdAt)===td).reduce((a,c)=>a+c.amount,0);
  const outToday=S.cash.filter(c=>c.type==='out'&&dayKey(c.createdAt)===td).reduce((a,c)=>a+c.amount,0);
  const list=[...S.cash].sort((a,b)=>b.createdAt-a.createdAt).slice(0,60);
  return `
  <div class="page-h"><h2>Каса</h2><span class="spacer" style="flex:1"></span>
    <button class="btn ghost" data-act="cashOut"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>Витрата</button>
    <button class="btn" data-act="cashIn"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/></svg>Внести</button></div>
  <section class="stats">
    <div class="stat is-accent"><div class="lbl">Баланс каси</div><div class="val">${money(balance)}</div></div>
    <div class="stat"><div class="lbl">Прихід сьогодні</div><div class="val" style="color:var(--good)">${money(inToday)}</div></div>
    <div class="stat"><div class="lbl">Витрати сьогодні</div><div class="val" style="color:var(--accent)">${money(outToday)}</div></div>

  </section>
  <div class="card"><div class="card-h"><h3>Операції</h3></div><table class="tbl"><thead><tr><th>Дата</th><th>Опис</th><th>Тип</th><th class="num">Сума</th><th></th></tr></thead><tbody>
  ${list.length?list.map(c=>`<tr>
    <td style="color:var(--muted)">${fmtDate(c.createdAt)} ${fmtTime(c.createdAt)}</td>
    <td>${esc(c.note||'—')}</td>
    <td>${c.type==='in'?'<span class="chip" style="background:rgba(34,179,107,.14);color:var(--good)">Прихід</span>':'<span class="chip">Витрата</span>'}</td>
    <td class="num" style="color:${c.type==='in'?'var(--good)':'var(--accent)'}">${c.type==='in'?'+':'−'}${money(c.amount)}</td>
    <td class="actions"><button class="mini" data-act="delCash" data-id="${c.id}"><svg viewBox="0 0 24 24" fill="none"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button></td>
  </tr>`).join(''):`<tr><td colspan="5"><div class="empty"><div class="big">💵</div>Операцій ще немає.</div></td></tr>`}
  </tbody></table></div>`;
},

reports(){
  const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d);}
  const data=days.map(d=>{const k=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());const v=S.cash.filter(c=>c.type==='in'&&dayKey(c.createdAt)===k).reduce((a,c)=>a+c.amount,0);return {lab:['Нд','Пн','Вт','Ср','Чт','Пт','Сб'][d.getDay()],v};});
  const maxV=Math.max(1,...data.map(d=>d.v));
  const totalRev=S.cash.filter(c=>c.type==='in').reduce((a,c)=>a+c.amount,0);
  const totalExp=S.cash.filter(c=>c.type==='out').reduce((a,c)=>a+c.amount,0);
  const salary=Math.round(totalRev*S.settings.masterRate/100);
  const counts={};S.orders.forEach(o=>o.items.forEach(i=>counts[i.name]=(counts[i.name]||0)+i.qty));
  const top=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const secret=body.classList.contains('secret');
  return `
  <div class="page-h"><h2>Звіти</h2><span class="spacer" style="flex:1"></span>
    <button class="btn ghost" data-act="topSecret">${secret?'🙈 Сховати':'👁 Top Secret'}</button></div>
  <section class="stats">
    <div class="stat"><div class="lbl">Загальна виручка</div><div class="val">${money(totalRev)}</div></div>
    <div class="stat"><div class="lbl">Витрати</div><div class="val" style="color:var(--accent)">${money(totalExp)}</div></div>
    <div class="stat"><div class="lbl">Чистий прибуток</div><div class="val" style="color:var(--good)">${money(totalRev-totalExp)}</div></div>
    <div class="stat is-accent"><div class="lbl">Зарплата майстра ${S.settings.masterRate}%</div><div class="val">${secret?money(salary):'••••••'}</div></div>
  </section>
  <div class="cols">
    <div class="lcol"><div class="card"><div class="card-h"><h3>Виручка за 7 днів</h3></div>
      <div class="chart">${data.map(d=>`<div class="bar-col"><div class="v">${d.v?Math.round(d.v/1000)+'k':''}</div><div class="bar" style="height:${Math.round(d.v/maxV*100)}%"></div><div class="lab">${d.lab}</div></div>`).join('')}</div>
    </div></div>
    <div class="rcol"><div class="card"><div class="card-h"><h3>Топ послуг</h3></div><table class="tbl"><tbody>
      ${top.length?top.map(([n,q])=>`<tr><td>${esc(n)}</td><td class="num">${q} шт</td></tr>`).join(''):'<tr><td><div class="empty">Немає даних</div></td></tr>'}
    </tbody></table></div></div>
  </div>`;
},

function updateStatusbar(){
  const debts=S.orders.filter(o=>(o.total-(o.paidAmount||0))>0.5);
  const low=S.products.filter(p=>p.qty<=2);
  const active=S.orders.filter(o=>o.status!=='done').length;
  let txt='Все спокійно — активних нагадувань немає',n=0;
  if(debts.length){txt=`Незакритих заказів: <b>${debts.length}</b> на суму ${money(debts.reduce((a,o)=>a+(o.total-(o.paidAmount||0)),0))}`;n+=debts.length;}
  else if(low.length){txt=`Закінчується товар: <b>${low.map(p=>p.name).join(', ')}</b>`;n+=low.length;}
  else if(active){txt=`Активних заказів у роботі: <b>${active}</b>`;}
  $('reminderTxt').innerHTML=txt;
  const dot=$('notifDot');dot.textContent=n;dot.style.display=n?'grid':'none';
}

let pickQuery='',pickStep=1,pickGroup=null,pickSub=null,pickShortcut=0;
const TILEPAL=['#2563eb','#16a34a','#d97706','#ea580c','#7c3aed','#dc2626','#0d9488','#9d5424','#0ea5e9','#be185d','#4f46e5','#65a30d'];

const PICK_SHORTCUTS=[
  {label:'Ремонт шин',icon:'🔧',color:'#dc2626',match:s=>/ремонт шин/i.test(s.sub||'')},
  {label:'Ремонт камер',icon:'🩹',color:'#0d9488',match:s=>/ремонт камер/i.test(s.sub||'')},
  {label:'Балансування',icon:'⚖️',color:'#7c3aed',match:s=>/балансув/i.test(s.sub||'')},
  {label:'Вентиль / кріплення',icon:'🎛️',color:'#9d5424',match:s=>/вентил|кріпл/i.test(s.sub||'')}

function renderPicker(){
  const active=S.services.filter(s=>s.active!==false);

  if(pickQuery){
    const res=active.filter(s=>(s.name+(s.unit||'')+(s.sub||'')+groupMeta(s.group).name).toLowerCase().includes(pickQuery));
    body=`<div class="tiles">${res.slice(0,80).map((s,i)=>svcTile(s,i)).join('')||'<div class="empty" style="grid-column:1/-1">Нічого не знайдено</div>'}</div>`;
    footer=`<button class="btn ghost" data-act="oNewSvc">➕ Нова</button><button class="btn ghost" data-act="oBack">Скасувати</button>`;
  } else if(pickStep===1){
    const groups=allGroups().filter(g=>active.some(s=>s.group===g.key));
    const shorts=PICK_SHORTCUTS.map((sc,i)=>active.some(sc.match)?`<button class="tile" data-act="pickShortcut" data-i="${i}" style="background:${sc.color}"><span class="ic">${sc.icon}</span><span>${esc(sc.label)}</span></button>`:'').join('');
    body=`<div class="tiles">${groups.map((g,i)=>`<button class="tile" data-act="pickGroup" data-key="${g.key}" style="background:${GCOL[g.key]||tileColor(i)}"><span class="ic">${g.icon}</span><span>${esc(g.name)}</span></button>`).join('')}${shorts}
      <button class="tile wide" data-act="oNewSvc">➕ Створити нову послугу</button></div>`;
    footer=`<button class="btn ghost" data-act="oBack">Скасувати</button>`;
  } else if(pickStep==='flt'){
    const sc=PICK_SHORTCUTS[pickShortcut];crumb=`${sc.icon} ${esc(sc.label)}`;
    const si=active.filter(sc.match);
    body=`<div class="tiles">${si.map((s,i)=>svcTile(s,i)).join('')||'<div class="empty" style="grid-column:1/-1">Порожньо</div>'}</div>`;
    footer=`<button class="btn ghost" data-act="pickBack">← Назад</button><button class="btn ghost" data-act="oNewSvc">➕ Нова</button><button class="btn ghost" data-act="oBack">Скасувати</button>`;
  } else if(pickStep===2){
    const g=groupMeta(pickGroup);crumb=`${g.icon} ${esc(g.name)}`;ph='Пошук підкатегорії...';
    const gi=active.filter(s=>s.group===pickGroup);
    const subs=[];[...(g.subs||[])].forEach(x=>{if(gi.some(s=>(s.sub||'Загальні')===x))subs.push(x);});
    gi.forEach(s=>{const u=s.sub||'Загальні';if(!subs.includes(u))subs.push(u);});
    body=`<div class="tiles">${subs.map((sub,i)=>`<button class="tile" data-act="pickSub" data-sub="${esc(sub)}" style="background:${tileColor(i)}"><span class="ic">📂</span><span>${esc(sub)}</span></button>`).join('')||'<div class="empty" style="grid-column:1/-1">Порожньо</div>'}</div>`;
    footer=`<button class="btn ghost" data-act="pickBack">← Назад</button><button class="btn ghost" data-act="oBack">Скасувати</button>`;
  } else {
    const g=groupMeta(pickGroup);crumb=`${g.icon} ${esc(g.name)} · ${esc(pickSub)}`;
    const si=active.filter(s=>s.group===pickGroup&&(s.sub||'Загальні')===pickSub);
    body=`<div class="tiles">${si.map((s,i)=>svcTile(s,i)).join('')||'<div class="empty" style="grid-column:1/-1">Порожньо</div>'}</div>`;
    footer=`<button class="btn ghost" data-act="pickBack">← Назад</button><button class="btn ghost" data-act="oNewSvc">➕ Нова</button><button class="btn ghost" data-act="oBack">Скасувати</button>`;
  }
  openModal('Додати послугу',`
    <input id="pickSearch" class="big-field" placeholder="${ph}" value="${esc(pickQuery)}" style="margin-bottom:10px">
    ${crumb?`<div class="pick-crumb">${crumb}</div>`:''}
    ${body}
  `,footer);
  if(pickQuery){const ps=$('pickSearch');if(ps){ps.focus();ps.setSelectionRange(ps.value.length,ps.value.length);}}
}
function pickBack(){if(pickStep===3){pickStep=2;pickSub=null;}else if(pickStep===2||pickStep==='flt'){pickStep=1;pickGroup=null;}renderPicker();}
function pickSvc(id){const s=S.services.find(x=>x.id===id);if(!s)return;const ex=draft.items.find(i=>i.name===s.name&&i.unit===(s.unit||''));if(ex)ex.qty++;else draft.items.push({name:s.name,price:s.price,qty:1,unit:s.unit||''});renderOrderEditor(!!draft.id);toast('Додано: '+s.name);}

/* ============ ACTION HANDLER ============ */
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-act]');if(!el)return;
  const act=el.dataset.act,id=el.dataset.id;
  switch(act){
    case 'route':go(el.dataset.route);break;
    case 'closeModal':closeModal();break;
    case 'newOrder':orderModal(null);break;
    case 'editOrder':{const o=S.orders.find(x=>x.id===id);if(o)orderModal(o);break;}
    case 'openOrder':{const o=S.orders.find(x=>x.id===id);if(o)orderModal(o);break;}
    case 'saveOrder':saveOrder(el.dataset.print==='1');break;
    case 'delOrder':if(confirm('Видалити заказ?')){S.orders=S.orders.filter(o=>o.id!==id);S.cash=S.cash.filter(c=>c.orderId!==id);save();renderNav();render();toast('Заказ видалено');}break;
    case 'cycleStatus':{const o=S.orders.find(x=>x.id===id);if(o){const seq=['wait','work','done'];o.status=seq[(seq.indexOf(o.status)+1)%3];if(o.status==='done'&&!o.paid){/*leave paid as is*/}save();renderNav();render();}break;}
    case 'printOrder':printOrder(id);break;
    case 'newClient':clientModal(null);break;
    case 'editClient':{const c=S.clients.find(x=>x.id===id);if(c)clientModal(c);break;}
    case 'saveClient':saveClient();break;
    case 'delClient':if(confirm('Видалити клієнта?')){S.clients=S.clients.filter(c=>c.id!==id);save();render();toast('Клієнта видалено');}break;
    case 'newService':serviceModal(null);break;
    case 'editService':{const s=S.services.find(x=>x.id===id);if(s)serviceModal(s);break;}
    case 'saveService':saveService();break;
    case 'delService':{const s=S.services.find(x=>x.id===id);if(s&&confirm('Ви точно хочете видалити цю послугу?\n\n«'+s.name+'»\n\nЇї буде приховано (active=false), історія заказів не зміниться.')){s.active=false;save();sbPushService(s);render();toast('Послугу приховано');}break;}
    case 'restoreService':{const s=S.services.find(x=>x.id===id);if(s){s.active=true;save();sbPushService(s);render();toast('Відновлено');}break;}
    case 'newCatBtn':newCategory(null);break;
    case 'ncSave':ncSave();break;
    case 'ncCancel':ncCancel();break;
    case 'toggleInactive':showInactive=!showInactive;render();break;
    case 'bgPick':$('bgFile').click();break;
    case 'bgDefault':delete S.settings.bgImage;save();applyBg();toast('Фон: ваше фото GT');break;

function doImportPrices(file){if(!file)return;const r=new FileReader();r.onload=()=>{try{
  const rows=parseCSV(r.result);if(rows.length<2)throw 0;
  const head=rows[0].map(h=>h.trim().toLowerCase());const ix=n=>head.indexOf(n);
  const ti=ix('title')>=0?ix('title'):ix('name'),pi=ix('price'),ci=ix('category'),ui=ix('unit'),si=ix('sort_order')>=0?ix('sort_order'):ix('sort'),ai=ix('is_active');
  if(ti<0||pi<0)throw 0;
  const list=[];
  for(let k=1;k<rows.length;k++){const row=rows[k];if(!row||!row[ti]||!row[ti].trim())continue;
    list.push({id:uid(),category:ci>=0?(row[ci]||'').trim()||'Інше':'Інше',name:row[ti].trim(),price:parseFloat(String(row[pi]).replace(',','.'))||0,unit:ui>=0?(row[ui]||'').trim():'',sort:si>=0?(parseInt(row[si])||k):k,active:ai<0?true:String(row[ai]).trim().toLowerCase()==='true'});}
  if(!list.length)throw 0;
  S.services=list;S.services.forEach(migrateSvc);save();go('services');toast('Імпортовано позицій: '+list.length);
}catch(e){toast('Не вдалося прочитати CSV — перевірте формат');}};r.readAsText(file);}

function saveOrder(doPrint){
  oSync();
  if(!draft.name){toast('Вкажіть клієнта');return;}
  if(!draft.items.length){toast('Додайте хоча б одну послугу');return;}
  let c=S.clients.find(x=>x.name.toLowerCase()===draft.name.toLowerCase()||(draft.plate&&x.plate&&x.plate.toLowerCase()===draft.plate.toLowerCase()));
  if(!c){c={id:uid(),name:draft.name,phone:draft.phone,plate:draft.plate,car:draft.car,driver:draft.driver,note:'',createdAt:Date.now()};S.clients.push(c);}
  else{if(draft.phone)c.phone=draft.phone;if(draft.plate)c.plate=draft.plate;if(draft.car)c.car=draft.car;if(draft.driver)c.driver=draft.driver;}
  const items=draft.items.map(i=>({name:i.name,price:i.price,qty:i.qty,unit:i.unit||''}));
  const total=items.reduce((a,i)=>a+i.price*i.qty,0);
  const paidAmount=Math.min(Math.max(0,draft.paidAmount||0),total);
  let oid;
  if(draft.id){const o=S.orders.find(x=>x.id===draft.id);
    Object.assign(o,{clientId:c.id,clientName:draft.name,phone:draft.phone,driver:draft.driver,car:draft.car,plate:draft.plate,comment:draft.comment,items,total,status:draft.status,paidAmount,paid:paidAmount>=total&&total>0});
    S.cash=S.cash.filter(x=>x.orderId!==o.id);if(paidAmount>0)S.cash.push({id:uid(),type:'in',amount:paidAmount,note:'Заказ '+pad6(o.num),orderId:o.id,createdAt:Date.now()});
    oid=o.id;toast('Заказ оновлено');
  }else{
    const num=++S.settings.orderSeq;
    const o={id:uid(),num,clientId:c.id,clientName:draft.name,phone:draft.phone,driver:draft.driver,car:draft.car,plate:draft.plate,comment:draft.comment,items,total,status:draft.status,post:null,paidAmount,paid:paidAmount>=total&&total>0,createdAt:Date.now()};
    S.orders.push(o);oid=o.id;
    if(paidAmount>0)S.cash.push({id:uid(),type:'in',amount:paidAmount,note:'Заказ '+pad6(num),orderId:o.id,createdAt:Date.now()});
    toast('Заказ '+pad6(num)+' створено');
  }
  save();closeModal();renderNav();render();
  sbPushClient(c);sbPushOrder(S.orders.find(x=>x.id===oid));
  if(doPrint)printOrder(oid);
}

const VTRIG=/монтаж|шиномонтаж|переоб|перекин|баланс|латк|пластир|ремонт|вентил|рихтув|правк|поглибл|вулканіз|накач|підкач|зняття|встановл|тягар|кріпл|гайк|диск/;
function vnorm(t){
  t=(t||'').toLowerCase().replace(/ё/g,'е').replace(/\u2019|\u02bc/g,"'");
  t=t.replace(/р(?=\s?\d)/g,'r');
  const NUM={'один':1,'одного':1,'одне':1,'одну':1,'два':2,'дві':2,'двох':2,'двоє':2,'три':3,'трьох':3,'троє':3,'чотири':4,'чотирьох':4,'чотирьом':4,"п'ять":5,'пять':5,"п'яти":5,'шість':6,'шести':6,'сім':7,'семи':7,'вісім':8,"дев'ять":9,'девять':9,'десять':10};
  t=t.replace(/[а-яёіїєґ']+/g,w=>NUM[w]!=null?String(NUM[w]):w);
  return t.replace(/\s+/g,' ').trim();
}
function vplate(t){const m=t.match(/([а-яa-z]{2})\s?(\d{4})\s?([а-яa-z]{2})/i);return m?(m[1]+m[2]+m[3]).toUpperCase():'';}
function vphone(t){const m=t.replace(/[^\d+]/g,' ').match(/(?:\+?38)?0\d{9}/);return m?m[0]:'';}
function vsize(seg){const m=seg.match(/r\s?(\d{1,2}(?:[.,]\d)?)/i);return m?('r'+m[1].replace(',','.')):'';}
function vqtyOf(seg){const m=seg.match(/(\d+)\s*(?:коліс|колеса|колесо|колес|шт|штук|штуки|штука)/);return m?parseInt(m[1]):0;}
function capName(s){return s.replace(/(^|\s)([a-zа-яёіїєґ])/g,(m,p,c)=>p+c.toUpperCase());}
function capCar(s){return s.split(' ').filter(Boolean).map(w=>/^[a-z0-9.\-]+$/i.test(w)?w.toUpperCase():(w.charAt(0).toUpperCase()+w.slice(1))).join(' ');}
function matchService(seg){
  const al=(S.voiceAliases||[]).find(a=>a.phrase&&seg.includes(a.phrase));
  if(al){const s=S.services.find(x=>x.id===al.serviceId);if(s)return s;}
  const size=vsize(seg),sizeNum=size?size.slice(1):'';
  const words=seg.split(/[^a-zа-яёіїєґ0-9.]+/i).filter(w=>w.length>=3&&!/^(коліс|колеса|колесо|колес|штук|штуки|шт)$/.test(w));
  let best=null,bsc=0;
  S.services.forEach(s=>{const nm=s.name.toLowerCase();let sc=0;
    words.forEach(w=>{if(/^\d/.test(w))return;const root=w.slice(0,5);if(w.length>=4&&nm.includes(root))sc++;});
    if(sizeNum){if(nm.includes(sizeNum))sc+=4;else sc-=2;}
    if(sc>bsc){bsc=sc;best=s;}});
  return bsc>=1?best:null;
}
function parseOrder(raw){
  const t=vnorm(raw);
  const plate=vplate(t),phone=vphone(t);
  let segs;
  if(t.includes(','))segs=t.split(',').map(s=>s.trim()).filter(Boolean);
  else segs=t.split(/\s+(?=монтаж|шиномонтаж|баланс|латк|пластир|ремонт|вентил|рихтув|правк|поглибл)/).map(s=>s.trim()).filter(Boolean);
  const items=[],unmatched=[];let name='',car='';
  segs.forEach((seg,idx)=>{
    const isSvc=VTRIG.test(seg)||!!vsize(seg)||(S.voiceAliases||[]).some(a=>a.phrase&&seg.includes(a.phrase));
    if(idx===0&&!isSvc){name=seg;return;}
    if(isSvc){const qty=vqtyOf(seg)||1;const s=matchService(seg);
      if(s)items.push({id:s.id,name:s.name,price:s.price,unit:s.unit||'',qty});
      else unmatched.push({text:seg.trim(),qty,size:vsize(seg)});return;}
    let clean=seg.replace(/([а-яa-z]{2})\s?\d{4}\s?([а-яa-z]{2})/i,'').replace(/(?:\+?38)?0\d{9}/,'').replace(/\d+/g,'').trim();
    if(clean&&!car)car=clean;
  });
  if(!name){name=(t.split(',')[0]||t.split(' ')[0]||'').trim();}
  return {name:capName(name),phone,plate,car:car?capCar(car):'',items,unmatched,raw};
}
const VEngine={rec:null,on:false,
  supported(){return !!(window.SpeechRecognition||window.webkitSpeechRecognition);},
  start(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;
    const r=new SR();this.rec=r;r.lang='uk-UA';r.interimResults=true;r.continuous=false;r.maxAlternatives=1;let fin='';
    r.onresult=e=>{let it='';fin='';for(let i=0;i<e.results.length;i++){const x=e.results[i];if(x.isFinal)fin+=x[0].transcript;else it+=x[0].transcript;}const el=$('micText');if(el){el.classList.remove('empty');el.textContent=(fin+' '+it).trim()||'…';}};
    r.onend=()=>{VEngine.on=false;const mb=$('micBig');if(mb)mb.classList.remove('rec');const st=$('micStatus');if(st)st.style.visibility='hidden';const el=$('micText');const txt=(fin||(el?el.textContent:'')).trim();if(txt&&txt!=='…'&&txt.indexOf('Натисніть')<0)handleVoice(txt);};
    r.onerror=ev=>{VEngine.on=false;const mb=$('micBig');if(mb)mb.classList.remove('rec');const st=$('micStatus');if(st){st.style.visibility='visible';st.innerHTML='Мікрофон недоступний ('+ev.error+') — введіть текстом';}};
    this.on=true;try{r.start();}catch(e){}},
  stop(){if(this.rec){try{this.rec.stop();}catch(e){}}this.on=false;}
};
function voiceStart(){
  closeModal();
  openModal('🎤 Голосова команда',`
    <div class="mic-wrap">
      <button class="mic-big" id="micBig" data-act="micToggle"><svg viewBox="0 0 24 24" fill="none"><rect x="9" y="3" width="6" height="11" rx="3" fill="#fff"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg></button>
      <div class="listening" id="micStatus" style="visibility:hidden"><span class="dot"></span> Слухаю...</div>
      <div class="transcript empty" id="micText">Натисніть мікрофон і продиктуйте заказ…</div>
      <div class="hint">Напр.: «Олександр, DAF XF, АА1234КК, монтаж двох коліс R22.5, балансування»</div>
      <div class="field" style="width:100%"><label>Або введіть текстом</label><input id="micManual" class="big-field" placeholder="Команда або заказ текстом..."></div>
    </div>
  `,`<button class="btn ghost" data-act="closeModal">Скасувати</button><button class="btn" data-act="micManualGo">Розпізнати текст</button>`);
  if(!VEngine.supported()){const st=$('micStatus');st.style.visibility='visible';st.innerHTML='Голос недоступний у цьому браузері — введіть текстом нижче';}
  else setTimeout(micToggle,300);
}
function micToggle(){if(!VEngine.supported()){toast('Скористайтесь полем вводу тексту');return;}
  if(VEngine.on){VEngine.stop();return;}
  const mb=$('micBig');if(mb)mb.classList.add('rec');const st=$('micStatus');if(st)st.style.visibility='visible';VEngine.start();}
function micManualGo(){const el=$('micManual');const v=el?el.value.trim():'';if(!v){toast('Введіть команду');return;}VEngine.stop();handleVoice(v);}
function handleVoice(raw){
  const t=vnorm(raw);
  if(/^(новий|створи)\s+кліент|^новий клієнт|^створи клієнт/.test(t)){closeModal();clientModal(null);return;}
  if(/^новий заказ|^створи заказ/.test(t)){closeModal();orderModal(null);return;}
  if(/знайди клієнт|знайти клієнт|покажи клієнт|пошук клієнт/.test(t)){let q=t.replace(/.*?клієнт[ауі]?/, '').trim();closeModal();go('clients');const s=$('search');if(s){s.value=q;query=q.toLowerCase();render();}return;}
  if(/покажи історі|історі|останні заказ|всі заказ/.test(t)){closeModal();go('orders');return;}
  if(/^друк|друк заказ/.test(t)){closeModal();const last=[...S.orders].sort((a,b)=>b.createdAt-a.createdAt)[0];if(last)printOrder(last.id);else toast('Немає заказів для друку');return;}
  if(/борг/.test(t)){closeModal();go('marketing');return;}
  if(/навчанн|вивчи|голос/.test(t)&&!VTRIG.test(t)){closeModal();go('voice');return;}
  voiceToEditor(parseOrder(raw));
}
function voiceToEditor(p){
  const items=p.items.map(i=>({name:i.name,price:i.price,qty:i.qty,unit:i.unit||''}));
  p.unmatched.forEach(u=>items.push({name:capName(u.text),price:0,qty:u.qty||1,unit:u.size?u.size.toUpperCase():''}));
  const temp={clientName:p.name,phone:p.phone,plate:p.plate,car:p.car,driver:'',comment:'',items,status:'work',paidAmount:0};
  closeModal();orderModal(temp);
}
function vTestRun(){const el=$('vTest');const out=$('vTestOut');if(!el||!out)return;const p=parseOrder(el.value);out.innerHTML=`Клієнт: <b>${esc(p.name||'—')}</b> · Авто: ${esc(p.car||'—')} · Номер: ${esc(p.plate||'—')}<br>Послуги: ${p.items.length?p.items.map(i=>esc(i.name)+' ×'+i.qty).join(', '):'—'}${p.unmatched.length?'<br>Не знайдено: '+p.unmatched.map(u=>'«'+esc(u.text)+'»').join(', '):''}`;}

/* ============ SUPABASE (опц. синхронізація) ============ */
function sbCfg(){return (S.settings&&S.settings.sb)||{};}
function sbOn(){const c=sbCfg();return !!(c.on&&c.url&&c.key&&c.key.length>10);}
function sbHeaders(){const c=sbCfg();const k=c.key||'';return {'apikey':k,'Authorization':'Bearer '+k,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'};}
function sbPushService(s){if(!sbOn())return;try{fetch(sbCfg().url+'/rest/v1/app_services?on_conflict=id',{method:'POST',headers:sbHeaders(),body:JSON.stringify({id:s.id,name:s.name,group_key:s.group||'',sub:s.sub||'',unit:s.unit||'',price:s.price||0,comment:s.comment||'',active:s.active!==false,sort_order:s.sort||0})}).catch(()=>{});}catch(e){}}
function sbPushCategory(c){if(!sbOn())return;try{fetch(sbCfg().url+'/rest/v1/app_categories?on_conflict=key',{method:'POST',headers:sbHeaders(),body:JSON.stringify({key:c.key,icon:c.icon||'🔧',name:c.name})}).catch(()=>{});}catch(e){}}
function sbPushClient(c){if(!sbOn()||!c)return;try{fetch(sbCfg().url+'/rest/v1/app_clients?on_conflict=id',{method:'POST',headers:sbHeaders(),body:JSON.stringify({id:c.id,name:c.name,phone:c.phone||'',plate:c.plate||'',car:c.car||'',driver:c.driver||'',created_at:new Date(c.createdAt||Date.now()).toISOString()})}).catch(()=>{});}catch(e){}}
function sbPushOrder(o){if(!sbOn()||!o)return;try{fetch(sbCfg().url+'/rest/v1/app_orders?on_conflict=id',{method:'POST',headers:sbHeaders(),body:JSON.stringify({id:o.id,num:o.num,client_id:o.clientId||'',client_name:o.clientName||'',phone:o.phone||'',driver:o.driver||'',car:o.car||'',plate:o.plate||'',comment:o.comment||'',items:JSON.stringify(o.items||[]),total:o.total||0,status:o.status||'work',paid_amount:o.paidAmount||0,created_at:new Date(o.createdAt||Date.now()).toISOString()})}).catch(()=>{});}catch(e){}}
async function sbPushAll(){if(!sbOn()){toast('Спершу увімкніть синхронізацію');return;}toast('Вивантаження...');try{
  for(const c of (S.categories||[])){const r=await fetch(sbCfg().url+'/rest/v1/app_categories?on_conflict=key',{method:'POST',headers:sbHeaders(),body:JSON.stringify({key:c.key,icon:c.icon||'🔧',name:c.name})});if(!r.ok){const t=await r.text();toast('Помилка app_categories: '+r.status+' '+t.slice(0,80));return;}}
  for(const s of S.services){const r=await fetch(sbCfg().url+'/rest/v1/app_services?on_conflict=id',{method:'POST',headers:sbHeaders(),body:JSON.stringify({id:s.id,name:s.name,group_key:s.group||'',sub:s.sub||'',unit:s.unit||'',price:s.price||0,comment:s.comment||'',active:s.active!==false,sort_order:s.sort||0})});if(!r.ok){const t=await r.text();toast('Помилка app_services: '+r.status+' '+t.slice(0,80));return;}}
  for(const c of S.clients){await fetch(sbCfg().url+'/rest/v1/app_clients?on_conflict=id',{method:'POST',headers:sbHeaders(),body:JSON.stringify({id:c.id,name:c.name,phone:c.phone||'',plate:c.plate||'',car:c.car||'',driver:c.driver||'',created_at:new Date(c.createdAt||Date.now()).toISOString()})});}
  for(const o of S.orders){await fetch(sbCfg().url+'/rest/v1/app_orders?on_conflict=id',{method:'POST',headers:sbHeaders(),body:JSON.stringify({id:o.id,num:o.num,client_id:o.clientId||'',client_name:o.clientName||'',phone:o.phone||'',driver:o.driver||'',car:o.car||'',plate:o.plate||'',comment:o.comment||'',items:JSON.stringify(o.items||[]),total:o.total||0,status:o.status||'work',paid_amount:o.paidAmount||0,created_at:new Date(o.createdAt||Date.now()).toISOString()})});}
  toast('Вивантажено: '+S.services.length+' послуг, '+S.clients.length+' клієнтів, '+S.orders.length+' заказів');
}catch(e){toast('Помилка: '+e.message);}}
async function sbPull(){if(!sbOn()){toast('Спершу увімкніть синхронізацію');return;}try{
  const rc=await fetch(sbCfg().url+'/rest/v1/app_categories?select=*',{headers:sbHeaders()});
  if(rc.ok){const cats=await rc.json();if(Array.isArray(cats))S.categories=cats.map(c=>({key:c.key,icon:c.icon||'🔧',name:c.name,subs:[]}));}
  const rs=await fetch(sbCfg().url+'/rest/v1/app_services?select=*&order=sort_order',{headers:sbHeaders()});
  if(rs.ok){const svc=await rs.json();if(Array.isArray(svc)&&svc.length)S.services=svc.map(s=>({id:s.id,name:s.name,group:s.group_key||'truck',sub:s.sub||'',unit:s.unit||'',price:+s.price||0,comment:s.comment||'',active:s.active!==false,sort:s.sort_order||0}));}
  const rcl=await fetch(sbCfg().url+'/rest/v1/app_clients?select=*',{headers:sbHeaders()});
  if(rcl.ok){const cls=await rcl.json();if(Array.isArray(cls))cls.forEach(rc=>{const ex=S.clients.find(x=>x.id===rc.id);const obj={id:rc.id,name:rc.name,phone:rc.phone||'',plate:rc.plate||'',car:rc.car||'',driver:rc.driver||'',note:'',createdAt:Date.parse(rc.created_at)||Date.now()};if(ex)Object.assign(ex,obj);else S.clients.push(obj);});}
  const ro=await fetch(sbCfg().url+'/rest/v1/app_orders?select=*',{headers:sbHeaders()});
  if(ro.ok){const ords=await ro.json();if(Array.isArray(ords))ords.forEach(r=>{let items=[];try{items=JSON.parse(r.items||'[]');}catch(e){}const ex=S.orders.find(x=>x.id===r.id);const obj={id:r.id,num:r.num,clientId:r.client_id||'',clientName:r.client_name||'',phone:r.phone||'',driver:r.driver||'',car:r.car||'',plate:r.plate||'',comment:r.comment||'',items,total:+r.total||0,status:r.status||'work',post:null,paidAmount:+r.paid_amount||0,paid:(+r.paid_amount||0)>=(+r.total||0)&&(+r.total||0)>0,createdAt:Date.parse(r.created_at)||Date.now()};if(ex)Object.assign(ex,obj);else S.orders.push(obj);});S.settings.orderSeq=Math.max(S.settings.orderSeq||0,...S.orders.map(o=>o.num||0));}
  save();renderNav();if(['services','settings','orders','clients','dashboard'].includes(route))render();toast('Завантажено з Supabase');
}catch(e){toast('Помилка Supabase — перевірте ключ і таблиці');}}
function sbSave(){const url=$('sbUrl').value.trim().replace(/\/$/,'');const key=$('sbKey').value.trim();const on=$('sbOn').checked;S.settings.sb={url,key,on};save();render();toast(on?'Синхронізацію увімкнено':'Збережено');}

/* ============ INIT ============ */
renderNav();render();
</script>
